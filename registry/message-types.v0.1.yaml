  version_compatibility: exact-version-only; unknown fields and versions fail closed
  authentication_requirement: external messages require selected non-none authentication; this draft selects
    no algorithm
  parameter_sources:
  - source: payload.party_error_category
    destination:
      kind: special
      special: normalized-party-projection
  - source: payload.observed_at
    destination:
      kind: special
      special: normalized-party-projection
  - source: message.message_digest
    destination:
      kind: special
      special: derived-notice-digest
  - source: message.prior_transcript_digest
    destination:
      kind: special
      special: derived-notice-prior-reference
internal_event_contracts:
- id: authoritative_timer_event
  delivery_class: timer
  external_party_message: false
  transcript_participation: accepted-mutating-event
  state_machine_events:
  - advance_authoritative_time
  - expire_session
  canonical_digest_source: RFC 8785 canonical timer-event bytes under private-match-timer-event/v0.1
- id: reject_message_relation
  delivery_class: derived_transition
  external_party_message: false
  transcript_participation: excluded
  state_machine_events:
  - reject_message
  canonical_digest_source: none; rejected input never enters accepted transcript
- id: new_session_guidance
  delivery_class: local_guidance
  external_party_message: false
  transcript_participation: excluded
  state_machine_events:
  - request_new_evaluation_session
  canonical_digest_source: none; pure local guidance does not mutate authoritative state
