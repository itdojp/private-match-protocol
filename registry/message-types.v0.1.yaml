- message_type: close_notice
  message_version: '0.1'
  delivery_class: coordinator_command
  direction: accepted-input
  allowed_senders:
  - coordinator
  verifier: coordinator
  intended_audience:
  - party_a_client
  - party_b_client
  payload:
    required_fields:
    - reason_category
    prohibited_fields:
    - raw_identifiers
    - normalized_identifiers
    - matching_elements
    - non_matching_elements
    - exact_intersection_count
    - private_attributes
    - plaintext_result
    - local_result
    - local_result_binding
    - actual_disclosure_payload
    - secret_input
  state_machine:
    events:
    - close_session
    transitions:
    - TR-CLOSE
  replay_or_idempotency_domain: (actor_id,operation_id) and independently (actor_id,idempotency_key)
  transcript_participation: accepted-mutating-event
  privacy_classification: public-routing-metadata
  failure_behavior: fail closed without transcript mutation; return only a reviewed
    Party category where the audience includes a Party
  version_compatibility: exact-version-only; unknown fields and versions fail closed
  authentication_requirement: external messages require selected non-none authentication;
    this draft selects no algorithm
  parameter_sources:
  - payload.reason_category -> reason_category
  - message.message_digest -> state canonical event/operation/callback digest
  - message.prior_transcript_digest -> state transcript chain guard
- message_type: expiry_notice
  message_version: '0.1'
  delivery_class: derived_transition
  direction: derived-output
  allowed_senders:
  - coordinator
  verifier: party_a_client_or_party_b_client
  intended_audience:
  - party_a_client
  - party_b_client
  payload:
    required_fields:
    - party_error_category
    - observed_at
    prohibited_fields:
    - raw_identifiers
    - normalized_identifiers
    - matching_elements
    - non_matching_elements
    - exact_intersection_count
    - private_attributes
    - plaintext_result
    - local_result
    - local_result_binding
    - actual_disclosure_payload
    - secret_input
    - internal_failure_code
  state_machine:
    events:
    - expire_session
    - advance_authoritative_time
    transitions:
    - TR-ADVANCE-TIME-EXPIRE
    - TR-ADVANCE-TIME-LIVE
    - TR-ADVANCE-TIME-NOOP
    - TR-CONSENT-EXPIRED
    - TR-EVALUATION-TIMEOUT
  replay_or_idempotency_domain: no external acceptance or retry domain
  transcript_participation: derived-notice-excluded
  privacy_classification: party-safe-normalized-notice
  failure_behavior: fail closed without transcript mutation; return only a reviewed
    Party category where the audience includes a Party
  version_compatibility: exact-version-only; unknown fields and versions fail closed
  authentication_requirement: external messages require selected non-none authentication;
    this draft selects no algorithm
  parameter_sources:
  - payload.party_error_category -> party_error_category
  - payload.observed_at -> observed_at
  - message.message_digest -> state canonical event/operation/callback digest
  - message.prior_transcript_digest -> state transcript chain guard
internal_event_contracts:
- id: authoritative_timer_event
  delivery_class: timer
  external_party_message: false
  transcript_participation: accepted-mutating-event
  state_machine_events:
  - advance_authoritative_time
  - expire_session
  canonical_digest_source: RFC 8785 canonical timer-event bytes under private-match-timer-event/v0.1
- id: reject_message_relation
  delivery_class: derived_transition
  external_party_message: false
  transcript_participation: excluded
  state_machine_events:
  - reject_message
  canonical_digest_source: none; rejected input never enters accepted transcript
- id: new_session_guidance
  delivery_class: local_guidance
  external_party_message: false
  transcript_participation: excluded
  state_machine_events:
  - request_new_evaluation_session
  canonical_digest_source: none; pure local guidance does not mutate authoritative
    state
