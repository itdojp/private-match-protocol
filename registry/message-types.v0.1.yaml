schema_version: '0.1'
registry_id: private-match-core-message-types/v0.1
artifact_status: draft
protocol_profile: private-match-core/v0.1
unknown_type_behavior: fail-closed
messages:
- message_type: session_proposal
  message_version: '0.1'
  delivery_class: coordinator_command
  direction: accepted-input
  allowed_senders:
  - coordinator
  verifier: coordinator
  intended_audience:
  - party_a_client
  - party_b_client
  payload:
    required_fields:
    - clock_policy
    - proposal_digest
    - selected_integration_profile
    - session_expires_at
    prohibited_fields:
    - raw_identifiers
    - normalized_identifiers
    - matching_elements
    - non_matching_elements
    - exact_intersection_count
    - private_attributes
    - plaintext_result
    - local_result
    - local_result_binding
    - actual_disclosure_payload
    - secret_input
  state_machine:
    events:
    - create_session
    transitions:
    - TR-CREATE
  replay_or_idempotency_domain: (actor_id,operation_id) and independently (actor_id,idempotency_key)
  transcript_participation: accepted-mutating-event
  privacy_classification: public-routing-metadata
  failure_behavior: fail closed without transcript mutation; return only a reviewed Party category where
    the audience includes a Party
  version_compatibility: exact-version-only; unknown fields and versions fail closed
  authentication_requirement: external messages require selected non-none authentication; this draft selects
    no algorithm
  parameter_sources:
  - source: payload.proposal_digest
    destination:
      kind: event-parameter
      parameter: session_proposal_parameter
      field: proposal_digest
      consumed_by:
      - transition: TR-CREATE
        operation: E-CREATE
  - source: payload.session_expires_at
