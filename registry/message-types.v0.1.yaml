      kind: event-parameter
      parameter: operation_envelope
      field: canonical_message_digest
      consumed_by:
      - transition: TR-CREATE
        operation: G-OPERATION-TRANSCRIPT-CHAIN
      - transition: TR-CREATE
        operation: E-APPEND-OPERATION-TRANSCRIPT
  - source: message.prior_transcript_digest
    destination:
