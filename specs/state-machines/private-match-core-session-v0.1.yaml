  next_state_relation: disjunction of delivery-class-specific enabled transition relations; explicit advance_authoritative_time/expire_session
    clock relations prevent rollback or a live post-deadline window; stuttering is limited to realizable
    exact-envelope responses, timer threshold no-op, derived rejection, and local guidance
  invariant_ids:
  - INV-REVEAL-SAFETY
  - INV-RESULT-SYMMETRY
  - INV-COMMITMENT-IMMUTABILITY
  - INV-SESSION-BINDING
  - INV-NO-REPLAY
  - INV-IDEMPOTENCY
  - INV-ONE-EVALUATION
  - INV-EXPIRY
  - INV-MINIMUM-DISCLOSURE
  - INV-OPAQUE-RECEIPT
  - INV-QUERY-BUDGET
  - INV-COORDINATOR-OUTCOME-CONFIDENTIALITY
  fairness_candidates:
  - weak fairness for the authoritative timer relation while a later TimeDomain point exists
  - weak fairness for atomic expire_session when a proposed timer value reaches session_expires_at
  - weak fairness for accepted contribution processing while a nonterminal evaluation remains enabled
  - no fairness assumption that a participant must respond or consent
  bounded_model_parameters:
  - id: ParticipantCount
    type: natural
    constraint: exactly 2
  - id: MaxSessions
    type: positive natural
    constraint: bounded by model configuration
  - id: MaxMessagesPerSender
    type: positive natural
    constraint: bounded by model configuration
  - id: MaxNonces
    type: positive natural
    constraint: bounded by model configuration
  - id: MaxBudgetUnits
    type: positive natural
    constraint: at least 1 and bounded
  - id: TimeDomain
    type: finite ordered set
    constraint: finite totally ordered set including creation, same-time no-op, stale/future-message bounds,
      evaluation deadline, consent expiry, verification expiry, session expiry, and policy-bounded maximum-jump
      points
  unresolved_nondeterminism:
  - participant response, withdrawal, and failure timing
  - selected integration profile success, timeout, or partial failure
  - authoritative ordering between withdrawal and disclosure completion
  - policy choice of durations, budget limits, minimum set size, and materially changed dataset
  environment_assumptions:
  - coordinator state, operation/callback dedup, budget, and terminal transitions are atomic and durable,
    but persistence is not implemented here
  - coordinator clock/environment may propose a nondecreasing bounded TimeDomain value; client timestamps
    cannot advance or roll back it
  - unused reservation release or expiry is atomic with the opaque authorization ledger and never constitutes
    a post-result refund
  - selected profile eventually supplies valid or invalid verification status without exposing coordinator
    plaintext outcome
  - transport authenticates sender and protects content, but transport is outside this artifact
  tla_model_status: not created or model-checked in this issue
