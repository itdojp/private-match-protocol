schema_version: '0.1'
record_type: session-state-machine
artifact:
  id: private-match-core-session-v0.1
  status: draft
  protocol_profile: private-match-core/v0.1
  owner: ITDO Inc.
  decision_output:
  - MATCH
  - NO_MATCH
  - INDETERMINATE
  created_at: '2026-07-21'
  reviewed_at: null
  next_review_at: '2026-10-21'
  compatibility: no stable or candidate compatibility commitment
scope:
  includes:
  - abstract session lifecycle and authoritative state ownership
  - participant, policy, commitment, attempt, replay, ordering, budget, result, consent, and expiry semantics
  - extension guards for separately reviewed disclosure profiles
  - failure taxonomy and TLA+ readiness mapping
  excludes:
  - PET selection or cryptographic implementation
  - wire message fields or canonical encoding
  - transport, persistence, or production coordinator implementation
  - actual identity, private-data, or disclosure payload
  - TLA+ model checking or any production/security certification
  core_disclosure_profile: NONE
  actual_disclosure_completion: unreachable in private-match-core/v0.1
authority_model:
  coordinator_authoritative_for:
  - session state
  - participant and policy binding
  - replay and sequence state
  - query-budget reservation and consumption
  - expiry and authoritative event ordering
  - normalized audit lifecycle
  coordinator_permitted_state:
  - normalized lifecycle and error category
  - participant, policy, session, message, nonce, sequence, and expiry bindings
  - opaque receipt reference
  - approved opaque artifact or transcript references
  - approved size class
  coordinator_prohibited_state:
  - MATCH, NO_MATCH, or INDETERMINATE plaintext outcome
  - raw identifiers or normalized private inputs
  - matching or non-matching elements
  - exact intersection count
  - private attributes
  - local secrets
  - actual disclosure payload
  opaque_receipt_reference:
    construction_policy: selected versioned integration profile defines a high-entropy or confidential
      opaque reference
    coordinator_treatment: compare and record as opaque bytes without deriving the result
    required_properties:
    - not enumerable over the three decision values
    - bound to session, participants, policy, commitment pair, evaluation attempt, and profile version
    - same reference acknowledged by both parties
    forbidden_constructions:
    - hash(MATCH)
    - hash(NO_MATCH)
    - hash(INDETERMINATE)
    - any bare low-entropy digest dictionary over the decision output
actors:
- id: party_a_client
  role: Party A local protocol client and private-input boundary
  trust_assumptions:
  - protects Party A local input before protocol preparation
  - does not establish that Party A input is truthful, complete, current, or authorized
  authority:
  - Party A local result value
  - Party A consent artifact
  residual_visibility:
  - public protocol and policy binding
  - own commitment and contribution
  - opaque receipt reference
  - own local decision value
  - normalized lifecycle and error category
  prohibited_data:
  - Party B raw or normalized private input
  - matching or non-matching elements
  - exact intersection count
  - Party B private attributes
- id: party_b_client
  role: Party B local protocol client and private-input boundary
  trust_assumptions:
  - protects Party B local input before protocol preparation
  - does not establish that Party B input is truthful, complete, current, or authorized
  authority:
  - Party B local result value
  - Party B consent artifact
  residual_visibility:
  - public protocol and policy binding
  - own commitment and contribution
  - opaque receipt reference
  - own local decision value
  - normalized lifecycle and error category
  prohibited_data:
  - Party A raw or normalized private input
  - matching or non-matching elements
  - exact intersection count
  - Party A private attributes
- id: coordinator
  role: Authoritative session, ordering, replay, budget, expiry, and normalized audit coordinator
  trust_assumptions:
  - atomically applies accepted session-state transitions
  - does not receive or derive the plaintext decision outcome
  - outcome confidentiality requires evidence from a later selected integration profile
  authority:
  - session lifecycle
  - participant and policy binding
  - replay and sequence state
  - query-budget reservation and consumption
  - expiry
  - normalized audit lifecycle
  residual_visibility:
  - session and participant pseudonymous references
  - protocol and policy versions
  - message identifiers, nonces, sequences, timing, and approved size class
  - opaque receipt reference
  - normalized lifecycle and error category
  prohibited_data:
  - plaintext MATCH, NO_MATCH, or INDETERMINATE outcome
  - raw or normalized private input
  - matching or non-matching elements
  - exact intersection count
  - private attributes
  - actual disclosure payload
  - local secrets
- id: selected_integration_profile
  role: Abstract, separately reviewed profile that verifies contributions and produces protected result
    artifacts
  trust_assumptions:
  - no concrete PET is selected by this state-machine artifact
  - profile-specific security, collusion, setup, and outcome-confidentiality properties remain unresolved
  authority:
  - profile-specific contribution verification
  - profile-defined opaque receipt-reference construction
  - profile-specific evidence for symmetric local result derivation
  residual_visibility:
  - only data explicitly permitted by the selected versioned profile
  - protocol, policy, participant, commitment-pair, and attempt binding
  prohibited_data:
  - unprofiled raw or normalized private input
  - unapproved exact count or element disclosure
  - silent fallback to a mock or unknown profile
- id: service_operator
  role: Operational administrator with approved normalized status access
  trust_assumptions:
  - operational access is separate from participant and integration-profile boundaries
  authority:
  - service administration outside protocol semantics
  residual_visibility:
  - aggregate service metrics
  - approved normalized audit lifecycle
  prohibited_data:
  - plaintext decision outcome
  - raw or normalized private input
  - matching elements
  - consent secret material
  - actual disclosure payload
- id: assurance_pipeline
  role: Produces private evidence and reviewed public-safe evidence metadata
  trust_assumptions:
  - does not convert structural validation into a security or production claim
  authority:
  - evidence status and provenance within a separately governed assurance process
  residual_visibility:
  - artifact digests
  - normalized check status
  - tool and protocol versions
  - approved public-safe configuration
  prohibited_data:
  - raw evidence containing private input
  - customer identifiers
  - plaintext decision outcome
  - secrets or internal topology in public output
- id: network_observer
  role: Passive observer of transport metadata
  trust_assumptions:
  - transport encryption is required but not implemented or established by this artifact
  authority: []
  residual_visibility:
  - network endpoints visible at the transport layer
  - timing, frequency, duration, and byte counts
  prohibited_data:
  - protocol plaintext under the assumed transport-confidentiality boundary
- id: malicious_participant
  role: Participant attempting inference, omission, replay, reordering, or policy bypass
  trust_assumptions:
  - may choose, omit, fabricate, or adapt inputs
  - may replay, reorder, duplicate, tamper, or collude unless a later profile excludes it
  authority:
  - its own local input choice within external authorization
  residual_visibility:
  - the same bounded participant-visible data as its compromised party role
  prohibited_data:
  - counterparty raw or normalized private input
  - matching elements
  - exact intersection count
  - unauthorized disclosure payload
event_parameter_catalog:
- id: session_context
  type: record<session_id,protocol_profile,policy_binding,participant_binding,intended_audience,commitment_pair_id,evaluation_attempt_id>
  description: Exact current binding; pre-stage values are explicitly NONE.
- id: replay_envelope
  type: record<sender_participant_id,message_id,nonce,sequence,issued_at,canonical_event_digest>
  description: Party-message ordering, issued time, and exact-duplicate identity; wire encoding is deferred.
- id: clock_policy
  type: record<authoritative_time,session_expiry,allowed_skew,stale_threshold>
  description: Typed policy parameters, not fixed business durations.
- id: participant_binding_parameter
  type: record<participant_id,key_id>
  description: One party binding for bind_participant_a or bind_participant_b.
- id: policy_acceptance_parameter
  type: record<policy_id,policy_version,acceptance_digest>
  description: Acceptance of the exact policy binding.
- id: query_budget_authorization_ref
  type: opaque_reference
  description: Reviewed authorization reference; no private policy detail.
- id: commitment_parameter
  type: opaque_commitment
  description: Profile-defined commitment; no raw or normalized input.
- id: evaluation_attempt_parameter
  type: opaque_identifier
  description: Single attempt identifier for the commitment pair.
- id: evaluation_contribution_parameter
  type: opaque_profile_contribution
  description: Profile-defined contribution or reference.
- id: local_result_parameter
  type: enum<MATCH,NO_MATCH,INDETERMINATE>
  description: Party-local value; prohibited from coordinator visibility.
- id: opaque_receipt_parameter
  type: opaque_profile_reference
  description: High-entropy or confidential reference defined by the reviewed integration profile.
- id: consent_binding_parameter
  type: record<session,participants,receipt,profile,scope,audience,issued_at,expires_at,nonce,digest>
  description: Exact result-bound consent metadata; no disclosure payload.
- id: disclosure_extension_parameter
  type: record<profile_id,profile_version,scope,audience,authorization_ref>
  description: Separately reviewed extension reference; none exists in core.
- id: normalized_failure_parameter
  type: failure_code
  description: Declared normalized category; private detail is not echoed.
- id: operation_envelope
  type: record<actor_id,operation_id,canonical_operation_digest,idempotency_key>
  description: Coordinator-command identity in an actor-scoped operation domain; separate from the participant
    replay envelope.
- id: profile_callback_envelope
  type: record<profile_id,profile_version,profile_instance_id,callback_id,canonical_callback_digest,idempotency_key,session_id,evaluation_attempt_id>
  description: Reviewed profile callback identity bound to profile instance, session, and evaluation attempt.
- id: time_advance_parameter
  type: record<new_authoritative_time,reason_or_source_class>
  description: Bounded coordinator-clock/environment time proposal; client time is never authoritative.
phases:
- id: UNINITIALIZED
  terminal: false
  core_reachable: true
  description: No session record exists; only create_session is enabled.
  allowed_terminal_operations: []
- id: CREATED
  terminal: false
  core_reachable: true
  description: Session identity, profile, policy, audience, clocks, and replay domains are initialized.
  allowed_terminal_operations: []
- id: PARTICIPANTS_BOUND
  terminal: false
  core_reachable: true
  description: Both participants and key identifiers are bound; policy acknowledgments may be accepted.
  allowed_terminal_operations: []
- id: COMMITMENTS_PENDING
  terminal: false
  core_reachable: true
  description: Query budget is reserved and commitments may be registered.
  allowed_terminal_operations: []
- id: COMMITTED
  terminal: false
  core_reachable: true
  description: Both immutable commitments and their commitment-pair identifier are registered.
  allowed_terminal_operations: []
- id: EVALUATING
  terminal: false
  core_reachable: true
  description: The first evaluation attempt has atomically consumed its budget reservation.
  allowed_terminal_operations: []
- id: RESULT_ACCEPTED
  terminal: false
  core_reachable: true
  description: Both parties accepted one symmetric local result bound to the same opaque receipt reference.
  allowed_terminal_operations: []
- id: CONSENT_PENDING
  terminal: false
  core_reachable: true
  description: At least one result-bound disclosure consent is registered; no disclosure is authorized
    yet.
  allowed_terminal_operations: []
- id: DISCLOSURE_AUTHORIZED
  terminal: false
  core_reachable: false
  description: A separately reviewed disclosure extension is authorized; unreachable in the core profile.
  allowed_terminal_operations: []
- id: CLOSED
  terminal: true
  core_reachable: true
  description: The session is closed; only exact replay and non-mutating rejection/query semantics remain.
  allowed_terminal_operations:
  - reject_message
  - request_new_evaluation_session
  - retry_idempotent_message
  - retry_idempotent_operation
  - retry_idempotent_profile_callback
- id: ABORTED
  terminal: true
  core_reachable: true
  description: The session failed closed; a new session is required for another evaluation.
  allowed_terminal_operations:
  - reject_message
  - request_new_evaluation_session
  - retry_idempotent_message
  - retry_idempotent_operation
  - retry_idempotent_profile_callback
- id: EXPIRED
  terminal: true
  core_reachable: true
  description: Authoritative session expiry has passed; no mutating protocol transition is permitted.
  allowed_terminal_operations:
  - reject_message
  - request_new_evaluation_session
  - retry_idempotent_message
  - retry_idempotent_operation
  - retry_idempotent_profile_callback
state_variables:
- id: phase
  type: enum<phase_id>
  initial: UNINITIALIZED
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - assurance_pipeline
  coordinator_access: read-write
  description: Normalized lifecycle phase; never encodes the decision outcome.
- id: session_id
  type: opaque_identifier
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Unique session binding.
- id: protocol_profile
  type: versioned_identifier
  initial: private-match-core/v0.1
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Exact protocol profile and version.
- id: policy_binding
  type: record<policy_id,policy_version>
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Immutable policy binding after evaluation begins.
- id: intended_audience
  type: set<participant_id>
  initial: EMPTY
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Exactly the bound participant set for result and consent artifacts.
- id: participant_binding
  type: map<party,record<participant_id,key_id>>
  initial: '{A:NONE,B:NONE}'
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Party and key binding; immutable after evaluation begins.
- id: policy_acceptance
  type: map<party,boolean>
  initial: '{A:false,B:false}'
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  coordinator_access: read-write
  description: Per-party acceptance of the exact policy binding.
- id: commitment
  type: map<party,opaque_commitment>
  initial: '{A:NONE,B:NONE}'
  owner:
  - coordinator
  - selected_integration_profile
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Opaque per-party commitments; immutable after evaluation begins.
- id: commitment_pair_id
  type: opaque_identifier
  initial: NONE
  owner:
  - coordinator
  - selected_integration_profile
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Binding over both commitments and versioned context without private input.
- id: evaluation_started
  type: boolean
  initial: 'false'
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Monotonic marker set by the first accepted start_evaluation.
- id: evaluation_attempt_id
  type: opaque_identifier
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Single accepted attempt identifier for the commitment pair.
- id: evaluation_contribution
  type: map<party,opaque_reference>
  initial: '{A:NONE,B:NONE}'
  owner:
  - selected_integration_profile
  visibility:
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: prohibited
  description: Profile-defined contribution references; coordinator access depends on a later reviewed
    profile and is not assumed.
- id: accepted_evaluation_count
  type: non_negative_integer
  initial: '0'
  owner:
  - coordinator
  visibility:
  - coordinator
  - assurance_pipeline
  coordinator_access: read-write
  description: Maximum one accepted evaluation for a commitment pair.
- id: query_budget_state
  type: enum<NONE,RESERVED,CONSUMED,RELEASED,EXPIRED,EXHAUSTED>
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - assurance_pipeline
  coordinator_access: read-write
  description: Authoritative reservation lifecycle; unused reservations release on close/abort or expire
    on session expiry, while started evaluations stay CONSUMED.
- id: proposed_result_state
  type: map<party,enum<NONE,MATCH,NO_MATCH,INDETERMINATE,CONFLICT>>
  initial: '{A:NONE,B:NONE}'
  owner:
  - party_a_client
  - party_b_client
  visibility: []
  coordinator_access: prohibited
  description: Entry-scoped party-local proposal; the formal invariant observer may compare A and B without
    granting either implementation party peer access.
  entry_visibility:
    A:
    - party_a_client
    B:
    - party_b_client
  profile_visibility:
    status: profile-dependent
    entries:
    - A
    - B
    constraint: A reviewed selected integration profile defines access; core grants no unconditional implementation
      access.
  coordinator_projection:
    permitted_fields: []
    prohibited_fields:
    - local_result
    - local_result_binding
    - peer proposed result
  global_invariant_observer:
    may_compare_entries: true
    implementation_actor_access: false
- id: accepted_result_state
  type: map<party,enum<NONE,MATCH,NO_MATCH,INDETERMINATE,CONFLICT>>
  initial: '{A:NONE,B:NONE}'
  owner:
  - party_a_client
  - party_b_client
  visibility: []
  coordinator_access: prohibited
  description: Entry-scoped party-local accepted value; symmetry is a global specification predicate,
    not peer-readable implementation state.
  entry_visibility:
    A:
    - party_a_client
    B:
    - party_b_client
  profile_visibility:
    status: profile-dependent
    entries:
    - A
    - B
    constraint: A reviewed selected integration profile defines access; core grants no unconditional implementation
      access.
  coordinator_projection:
    permitted_fields: []
    prohibited_fields:
    - local_result
    - local_result_binding
    - peer accepted result
  global_invariant_observer:
    may_compare_entries: true
    implementation_actor_access: false
- id: opaque_receipt_ref
  type: opaque_profile_reference
  initial: NONE
  owner:
  - selected_integration_profile
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-only
  description: Profile-defined non-enumerable reference; never a bare digest of the three decision values.
- id: result_ack
  type: map<party,record<opaque_receipt_ref,local_result_binding>>
  initial: '{A:NONE,B:NONE}'
  owner:
  - party_a_client
  - party_b_client
  visibility: []
  coordinator_access: opaque-reference-only
  description: Entry-scoped party acknowledgment; coordinator projection is limited to the opaque reference
    and normalized acknowledgment status.
  entry_visibility:
    A:
    - party_a_client
    B:
    - party_b_client
  profile_visibility:
    status: profile-dependent
    entries:
    - A
    - B
    constraint: A reviewed selected integration profile defines access; core grants no unconditional implementation
      access.
  coordinator_projection:
    permitted_fields:
    - opaque_receipt_ref
    - normalized_ack_status
    prohibited_fields:
    - local_result
    - local_result_binding
    - peer acknowledgment binding
  global_invariant_observer:
    may_compare_entries: true
    implementation_actor_access: false
- id: consent
  type: map<party,record_or_none>
  initial: '{A:NONE,B:NONE}'
  owner:
  - party_a_client
  - party_b_client
  visibility:
  - party_a_client
  - party_b_client
  - coordinator
  coordinator_access: binding-metadata-only
  description: Result-bound consent metadata; no secret consent payload in coordinator state.
- id: disclosure_profile_ref
  type: versioned_identifier_or_none
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Reference to a separately reviewed disclosure profile; NONE in core.
- id: disclosure_state
  type: enum<NONE,CONSENT_PENDING,AUTHORIZED,COMPLETED,WITHDRAWN>
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - assurance_pipeline
  coordinator_access: read-write
  description: Normalized extension lifecycle; does not contain a reveal payload.
- id: session_created_at
  type: authoritative_timestamp
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  coordinator_access: read-write
  description: Coordinator authoritative creation time.
- id: session_expires_at
  type: authoritative_timestamp
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  coordinator_access: read-write
  description: Policy-derived authoritative expiry.
- id: authoritative_time
  type: monotonic_coordinator_time
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  coordinator_access: read-write
  description: Nondecreasing transition clock; client time is never authoritative.
- id: allowed_clock_skew
  type: policy_duration
  initial: POLICY_PARAMETER
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  coordinator_access: read-write
  description: Non-negative bounded tolerance for auxiliary client timestamps.
- id: message_stale_threshold
  type: policy_duration
  initial: POLICY_PARAMETER
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  coordinator_access: read-write
  description: Maximum accepted age relative to authoritative time.
- id: verification_material_validity
  type: record<not_before,not_after,status>
  initial: NONE
  owner:
  - selected_integration_profile
  - coordinator
  visibility:
  - coordinator
  - selected_integration_profile
  coordinator_access: status-and-interval-only
  description: Validity interval and status; missing or expired material fails closed.
- id: next_sequence
  type: map<party,non_negative_integer>
  initial: '{A:0,B:0}'
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  coordinator_access: read-write
  description: Per-sender next accepted sequence.
- id: accepted_message_ids
  type: map<party,message_id_map>
  initial: '{A:{},B:{}}'
  owner:
  - coordinator
  visibility:
  - coordinator
  coordinator_access: read-write
  description: Accepted message ID to canonical event digest and normalized response mapping.
- id: accepted_nonces
  type: map<replay_domain,nonce_map>
  initial: '{}'
  owner:
  - coordinator
  visibility:
  - coordinator
  coordinator_access: read-write
  description: Accepted nonce registry in replay domain (session_id,sender_participant_id).
- id: accepted_event_digests
  type: map<party,digest_map>
  initial: '{A:{},B:{}}'
  owner:
  - coordinator
  visibility:
  - coordinator
  coordinator_access: read-write
  description: Canonical event digests used only for duplicate equality, not for decision receipts.
- id: normalized_responses
  type: map<message_id,normalized_response>
  initial: '{}'
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  coordinator_access: read-write
