invariants:
- id: INV-REVEAL-SAFETY
  statement: Disclosure completion implies identical MATCH results, current bilateral record-scoped consent,
    a reviewed versioned disclosure profile, exact scope and audience binding, and a live session; core
    completion is unreachable.
  state_variables:
  - accepted_result_state
  - consent
  - session_id
  - participant_binding
  - opaque_receipt_ref
  - disclosure_profile_ref
  - intended_audience
  - authoritative_time
  - session_expires_at
  - phase
  - disclosure_state
  conditions:
  - *id004
  - *id007
  - *id008
  - *id009
  - *id010
  - *id011
  - *id012
  - *id013
  - *id014
  - *id015
  - *id016
  - id: I-DISCLOSURE-COMPLETE
    predicate: implies
    reads:
    - disclosure_state
    arguments:
    - COMPLETED implies all guards
    parameter_reads: []
  violation_effect: fail closed; no payload disclosure; abort or reject with normalized category
- id: INV-RESULT-SYMMETRY
  statement: The global specification observer verifies identical party-local accepted values and one
    opaque receipt without granting either party peer-entry access or the coordinator a local-result binding.
  state_variables:
  - proposed_result_state
  - accepted_result_state
  - result_ack
  - opaque_receipt_ref
  - phase
  - terminal_reason
  conditions:
  - id: I-SYMMETRIC-VALUES
    predicate: all_equal
    reads:
    - accepted_result_state
    arguments:
    - A=B when RESULT_ACCEPTED
    parameter_reads: []
  - id: I-SYMMETRIC-RECEIPT
    predicate: all_equal
    reads:
    - result_ack
    - opaque_receipt_ref
    arguments:
    - A.ref=B.ref=opaque_receipt_ref
    parameter_reads: []
  - id: I-CONFLICT-ABORTS
    predicate: implies
    reads:
    - accepted_result_state
    - phase
    - terminal_reason
    arguments:
    - CONFLICT implies ABORTED and RESULT_CONFLICT
    parameter_reads: []
  - id: I-ENTRY-SCOPED-RESULTS
    predicate: entry_visibility_isolated
    reads:
    - proposed_result_state
    - result_ack
    - accepted_result_state
    parameter_reads: []
    arguments:
    - A reads only A
    - B reads only B
    - global invariant observer is not an implementation actor
    - coordinator projection excludes local result and binding
  violation_effect: ABORTED with RESULT_CONFLICT; neither party result is preferred
- id: INV-COMMITMENT-IMMUTABILITY
  statement: After evaluation_started becomes true, both commitments, the commitment pair, policy version,
    and participant binding never change.
  state_variables:
  - evaluation_started
  - commitment
  - commitment_pair_id
  - policy_binding
  - participant_binding
  conditions:
  - id: I-COMMITMENT-STABLE
    predicate: unchanged_after
    reads:
    - evaluation_started
    - commitment
    - commitment_pair_id
    - policy_binding
    - participant_binding
    arguments:
    - evaluation_started=true
    parameter_reads: []
  violation_effect: reject COMMITMENT_MUTATION and abort when integrity is uncertain
- id: INV-SESSION-BINDING
  statement: Every accepted event after creation binds to one session, protocol version, policy version,
    participant/key set, audience, commitment pair, and evaluation attempt; absent pre-stage values bind
    explicitly to NONE.
  state_variables:
  - session_id
  - protocol_profile
  - policy_binding
  - participant_binding
  - intended_audience
  - commitment_pair_id
  - evaluation_attempt_id
  conditions:
  - *id004
  violation_effect: reject the specific normalized mismatch category without partial state change
- id: INV-NO-REPLAY
  statement: A nonce is unique inside replay domain (session_id,sender_participant_id); cross-session,
    prior-policy, and prior-participant-set substitution fails closed.
  state_variables:
  - session_id
  - participant_binding
  - accepted_nonces
  - accepted_message_ids
  - accepted_event_digests
  conditions:
  - id: I-REPLAY-DOMAIN
    predicate: unique_within
    reads:
    - accepted_nonces
    - session_id
    - participant_binding
    arguments:
    - (session_id,sender_participant_id)
    parameter_reads: []
  violation_effect: reject REPLAY or REPLAY_CONFLICT; conflicting duplicates require terminal policy handling
- id: INV-IDEMPOTENCY
  statement: Each externally delivered class uses its own realizable scoped identity; exact duplicates
    return the class-specific prior response without another state, budget, release, disclosure, sequence,
    or audit change.
  state_variables:
  - accepted_message_ids
  - accepted_nonces
  - accepted_event_digests
  - normalized_responses
  - accepted_operation_ids
  - accepted_operation_digests
  - normalized_operation_responses
  - accepted_profile_callback_ids
  - accepted_profile_callback_digests
  - normalized_profile_callback_responses
  - query_budget_state
  - next_sequence
  conditions:
  - id: I-EXACT-PARTY-DUPLICATE
    predicate: exact_duplicate
    reads:
    - accepted_message_ids
    - accepted_nonces
    - accepted_event_digests
    parameter_reads: []
    arguments:
    - same sender message_id nonce issued_at and canonical event digest
  - id: I-EXACT-OPERATION-DUPLICATE
    predicate: exact_duplicate
    reads:
    - accepted_operation_ids
    - accepted_operation_digests
    parameter_reads: []
    arguments:
    - same actor operation_id idempotency_key and canonical operation digest
  - id: I-EXACT-CALLBACK-DUPLICATE
    predicate: exact_duplicate
    reads:
    - accepted_profile_callback_ids
    - accepted_profile_callback_digests
    parameter_reads: []
    arguments:
    - same profile instance session attempt callback_id key and canonical callback digest
  violation_effect: conflicting duplicate is REPLAY_CONFLICT
- id: INV-ONE-EVALUATION
  statement: A commitment pair receives at most one accepted evaluation; INDETERMINATE, timeout, and failure
    cannot create a free second attempt.
  state_variables:
  - commitment_pair_id
  - accepted_evaluation_count
  - evaluation_attempt_id
  - query_budget_state
  conditions:
  - id: I-MAX-ONE-EVALUATION
    predicate: less_than_or_equal
    reads:
    - accepted_evaluation_count
    arguments:
    - '1'
    parameter_reads: []
  violation_effect: current session remains terminal or result-accepted; a new authorized session is required
- id: INV-EXPIRY
  statement: Time never rolls back; crossed session, evaluation, or consent deadlines are terminalized
    atomically, and terminal sessions admit only non-mutating exact delivery responses, bounded rejection,
    or new-session guidance.
  state_variables:
  - phase
  - authoritative_time
  - session_expires_at
  - evaluation_deadline
  - consent
  - disclosure_state
  conditions:
  - id: I-TIME-NONDECREASING
    predicate: monotonic
    reads:
    - authoritative_time
    parameter_reads: []
    arguments:
    - next authoritative_time >= current authoritative_time
  - id: I-DEADLINE-ATOMIC
    predicate: atomic_deadline_terminalization
    reads:
    - phase
    - authoritative_time
    - session_expires_at
    - evaluation_deadline
    - consent
    parameter_reads: []
    arguments:
    - no live state remains after an active deadline is crossed
  - id: I-TERMINAL-NON-MUTATING
    predicate: terminal_allows_only
    reads:
    - phase
    parameter_reads: []
    arguments:
    - retry_idempotent_message
    - retry_idempotent_operation
    - retry_idempotent_profile_callback
    - request_new_evaluation_session
    - reject_message
  violation_effect: reject with SESSION_EXPIRED, SESSION_CLOSED, or SESSION_ABORTED
- id: INV-MINIMUM-DISCLOSURE
  statement: Core state, audit, and error surfaces contain no raw identifiers, normalized private inputs,
    matching elements, exact count, coordinator plaintext outcome, private attributes, local secrets,
    or reveal payload.
  state_variables:
  - accepted_result_state
  - opaque_receipt_ref
  - audit_lifecycle
  - normalized_responses
  - normalized_operation_responses
  - normalized_profile_callback_responses
  conditions:
  - id: I-PROHIBITED-DATA-ABSENT
    predicate: absent
    reads:
    - audit_lifecycle
    - normalized_responses
    - normalized_operation_responses
    - normalized_profile_callback_responses
    arguments:
    - raw identifiers
    - normalized private inputs
    - matching or non-matching elements
    - exact intersection count
    - private attributes
    - local secrets
    - actual disclosure payload
    - plaintext decision outcome in coordinator state
    parameter_reads: []
  violation_effect: reject artifact or transition and require privacy review
- id: INV-OPAQUE-RECEIPT
  statement: The coordinator-visible receipt reference is profile-defined and non-enumerable; a bare low-entropy
    digest of the three result values is forbidden.
  state_variables:
  - opaque_receipt_ref
  conditions:
  - id: I-OPAQUE-RECEIPT
    predicate: profile_opaque_reference
    reads:
    - opaque_receipt_ref
    arguments:
    - high entropy or confidential
    - not hash(MATCH|NO_MATCH|INDETERMINATE)
    parameter_reads: []
  violation_effect: reject RESULT_CONFLICT or profile validation; do not accept a result
- id: INV-QUERY-BUDGET
  statement: A coordinator reservation is consumed at first start; an unused reservation is released on
    close/abort or expired on session expiry, while any started evaluation remains CONSUMED without refund.
  state_variables:
  - query_budget_state
  - evaluation_started
  - accepted_evaluation_count
  conditions:
  - id: I-BUDGET-CONSUMPTION
    predicate: atomic_transition
    reads:
    - query_budget_state
    - evaluation_started
    arguments:
    - RESERVED->CONSUMED with first start_evaluation
    parameter_reads: []
  - id: I-TERMINAL-BUDGET-DISPOSITION
    predicate: atomic_terminal_disposition
    reads:
    - query_budget_state
    - evaluation_started
    - phase
    parameter_reads: []
    arguments:
    - pre-start close or abort RESERVED->RELEASED
    - pre-start expiry RESERVED->EXPIRED
    - post-start remains CONSUMED
  violation_effect: reject QUERY_BUDGET_MISSING or QUERY_BUDGET_EXHAUSTED
- id: INV-COORDINATOR-OUTCOME-CONFIDENTIALITY
  statement: Coordinator state and audit contain an opaque receipt reference and normalized lifecycle
    only, never MATCH, NO_MATCH, or INDETERMINATE.
  state_variables:
  - accepted_result_state
  - opaque_receipt_ref
  - phase
  - audit_lifecycle
  conditions:
  - id: I-COORDINATOR-NO-PLAINTEXT
    predicate: visibility_excludes
    reads:
    - accepted_result_state
    - audit_lifecycle
    arguments:
    - coordinator
    - plaintext decision outcome
    parameter_reads: []
  violation_effect: reject the profile or artifact; outcome confidentiality remains unestablished until
    evidenced
query_budget_semantics:
  authority: coordinator
  reservation_required_before_evaluation: true
  consumption_point: atomically on first accepted start_evaluation
  failure_refund: none after evaluation start; pre-evaluation release or expiry is reservation disposition,
    not a result refund
  idempotent_resend_cost: no additional consumption for an exact duplicate on the same commitment pair
  new_evaluation_requirement:
  - new session or separately reviewed versioned retry transition
  - new query-budget authorization
  - participant and policy rebinding
  - material dataset-change policy
  prohibitions:
  - client-side counter as sole authority
  - free probing after timeout, failure, or INDETERMINATE
  - more than one accepted evaluation per commitment pair
  unused_reservation_on_close: RELEASED atomically when evaluation_started=false
  unused_reservation_on_abort: RELEASED atomically when evaluation_started=false
  unused_reservation_on_expiry: EXPIRED atomically when evaluation_started=false
  post_start_terminal_disposition: CONSUMED remains CONSUMED; no result, timeout, failure, conflict, or
    INDETERMINATE refund
  authorization_ledger_assumption: reservation release or expiry is atomic with the opaque authorization
    ledger and emits only a normalized audit category
  released_reservation_reuse: forbidden in the terminal session; a new session and authorization are required
result_acceptance_semantics:
  allowed_values:
  - MATCH
  - NO_MATCH
  - INDETERMINATE
  acceptance_rule: both party-local values are identical and both acknowledgments bind to the same opaque
    receipt reference
  coordinator_view: opaque receipt reference plus normalized lifecycle only
  conflict_rule: fail closed to ABORTED with RESULT_CONFLICT; never prefer either party or fall back
  indeterminate_rule: valid minimum result but never a disclosure condition and never free same-pair reevaluation
  forbidden:
  - single-party accepted result
  - party-specific accepted result
  - coordinator plaintext result
  - bare digest of a three-value result
  - automatic mismatch fallback
consent_semantics:
  allowed_after: RESULT_ACCEPTED only
  required_binding_fields:
  - session_id
  - participant set
  - opaque receipt reference
  - disclosure profile ID and version
  - exact disclosure scope
  - recipient or intended audience
  - issued_at
  - expires_at
  - consent nonce
  - consent artifact digest
  match_is_blanket_consent: false
  withdrawal_before_completion: atomically invalidates authorization and moves the session to ABORTED
    with CONSENT_WITHDRAWN; a new session is required
  withdrawal_after_completion: CLOSED rejects the mutation; it does not reverse a past disclosure and
    any new authorization requires a new session
  core_payload: none; actual payload and transfer are outside private-match-core/v0.1
  expiry_or_withdrawal_policy: new-session-required
  replacement_policy: same-session replacement is forbidden after expiry or withdrawal; preserve history
    and require a new session, result, budget, and consent
  mixed_generation_policy: old and new consent generations cannot authorize together because v0.1 has
    no same-session re-consent transition
clock_and_expiry:
  authoritative_clock: coordinator monotonic transition clock
  client_issued_at: auxiliary information only; never security authority
  allowed_clock_skew:
    type: non-negative policy duration
    constraint: less than session TTL
  session_expiry:
    type: positive policy duration
    effect: phase becomes EXPIRED when authoritative_time >= session_expires_at
  consent_expiry:
    type: positive policy duration
    constraint: no later than session expiry
  message_stale_threshold:
    type: non-negative policy duration
    effect: older messages reject as STALE_MESSAGE without state mutation
  verification_material_validity:
    type: closed-open validity interval
    effect: missing or out-of-interval material fails closed
  timeout_vs_expiry: timeout ends one evaluation attempt as ABORTED; expiry ends the whole session as
    EXPIRED
  clock_rollback: never decreases authoritative_time; rollback or ambiguous time source fails closed and
    is audited
  time_advance_event: advance_authoritative_time
  time_advance_parameter: new_authoritative_time and reason_or_source_class
  maximum_time_jump:
    type: non-negative policy duration
    constraint: bounded by policy and finite TimeDomain; no client override
  evaluation_deadline:
    type: authoritative timestamp
    effect: set at start_evaluation; timeout when authoritative_time >= evaluation_deadline
  stale_message_relation: authoritative_time - message_stale_threshold <= issued_at <= authoritative_time
    + allowed_clock_skew
  atomic_deadline_crossing: session expiry, evaluation timeout, or active consent expiry is terminalized
    atomically with the time update; no live window remains
replay_and_ordering:
  replay_domain:
  - session_id
  - sender_participant_id
  per_sender_sequence: strict monotonic next_sequence; only accepted events advance it
  message_identity:
  - message_id
  - nonce
  - issued_at
  - canonical event digest
  exact_duplicate: no-op and return prior normalized response
  conflicting_duplicate: REPLAY_CONFLICT; no partial state change and policy-defined abort
  stale_sequence: REPLAY or STALE_MESSAGE; no state change
  future_sequence_gap: retryable OUT_OF_ORDER; no buffering and no state change
  cross_session_replay: SESSION_MISMATCH
  prior_policy_replay: POLICY_VERSION_MISMATCH
  prior_participant_set_replay: PARTICIPANT_MISMATCH
  transport_buffering: not implemented or specified
  operation_domain:
  - actor_id
  - operation_id
  operation_identity:
  - operation_id
  - idempotency_key
  - canonical operation digest
  profile_callback_domain:
  - profile_id
  - profile_version
  - profile_instance_id
  - session_id
  - evaluation_attempt_id
  profile_callback_identity:
  - callback_id
  - idempotency_key
  - canonical callback digest
  timer_identity: level-triggered authoritative threshold; no message_id or nonce
  derived_transition_identity: no external delivery or retry identity
retry_semantics:
  idempotent_resend: exact duplicate; return prior normalized response without budget or sequence change
  transient_message_retry: new message_id and nonce at the expected sequence after correcting a retryable
    failure
  evaluation_continuation: remaining contribution within the one bound attempt; never a second evaluation
  new_attempt_id: not allowed in v0.1 for the same commitment pair without a separately reviewed versioned
    transition
  new_session: required after INDETERMINATE re-evaluation request, timeout, terminal failure, or commitment-pair
    change
  non_retryable_terminal: closed, aborted, or expired session permits only exact replay, bounded rejection,
    and new-session guidance
  coordinator_operation_retry: actor-scoped exact operation envelope returns the prior normalized operation
    response through retry_idempotent_operation
  profile_callback_retry: profile-instance/session/attempt-scoped exact callback envelope returns the
    prior normalized callback response through retry_idempotent_profile_callback
  timer_retry: same threshold is a level-triggered no-op; rollback and out-of-domain jumps reject
  derived_transition: no external delivery, duplicate, or retry path
  party_retry_scope: retry_idempotent_message applies only to party_message delivery and never to coordinator
    commands, profile callbacks, timers, or derived transitions
