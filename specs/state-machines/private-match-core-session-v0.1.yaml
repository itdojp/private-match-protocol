- code: AUDIENCE_MISMATCH
  disposition: message-only-rejection
  retryable: false
  requires_new_message: false
  requires_new_session: false
  query_budget_effect: unchanged-from-current-state
  party_error_category: BINDING_ERROR
  detail_visibility: coordinator-and-approved-audit-only; parties receive normalized category
  description: Fail-closed handling for AUDIENCE_MISMATCH; details must not create a counterparty inference
    oracle.
- code: REPLAY
  disposition: message-only-rejection
  retryable: false
  requires_new_message: false
  requires_new_session: false
  query_budget_effect: unchanged-from-current-state
  party_error_category: REPLAY_ERROR
  detail_visibility: coordinator-and-approved-audit-only; parties receive normalized category
  description: Fail-closed handling for REPLAY; details must not create a counterparty inference oracle.
- code: REPLAY_CONFLICT
  disposition: session-abort
  retryable: false
  requires_new_message: false
  requires_new_session: true
  query_budget_effect: unchanged-from-current-state
  party_error_category: REPLAY_ERROR
  detail_visibility: coordinator-and-approved-audit-only; parties receive normalized category
  description: Fail-closed handling for REPLAY_CONFLICT; details must not create a counterparty inference
    oracle.
- code: OUT_OF_ORDER
  disposition: message-only-rejection
  retryable: true
  requires_new_message: true
  requires_new_session: false
  query_budget_effect: unchanged-from-current-state
  party_error_category: ORDERING_ERROR
  detail_visibility: coordinator-and-approved-audit-only; parties receive normalized category
  description: Fail-closed handling for OUT_OF_ORDER; details must not create a counterparty inference
    oracle.
- code: STALE_MESSAGE
  disposition: message-only-rejection
  retryable: true
  requires_new_message: true
  requires_new_session: false
  query_budget_effect: unchanged-from-current-state
  party_error_category: ORDERING_ERROR
  detail_visibility: coordinator-and-approved-audit-only; parties receive normalized category
  description: Fail-closed handling for STALE_MESSAGE; details must not create a counterparty inference
    oracle.
- code: COMMITMENT_MISMATCH
  disposition: message-only-rejection
  retryable: false
  requires_new_message: false
  requires_new_session: false
  query_budget_effect: unchanged-from-current-state
  party_error_category: COMMITMENT_ERROR
  detail_visibility: coordinator-and-approved-audit-only; parties receive normalized category
  description: Fail-closed handling for COMMITMENT_MISMATCH; details must not create a counterparty inference
    oracle.
- code: COMMITMENT_MUTATION
  disposition: session-abort
  retryable: false
  requires_new_message: false
  requires_new_session: true
