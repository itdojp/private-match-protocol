- id: query_budget_state
  type: enum<NONE,RESERVED,CONSUMED,EXHAUSTED>
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - assurance_pipeline
  coordinator_access: read-write
  description: Authoritative reservation and atomic consumption state.
- id: proposed_result_state
  type: map<party,enum<NONE,MATCH,NO_MATCH,INDETERMINATE,CONFLICT>>
  initial: '{A:NONE,B:NONE}'
  owner:
  - party_a_client
  - party_b_client
  visibility:
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: prohibited
  description: Party-local result proposed in the acknowledgment; coordinator sees no value.
- id: accepted_result_state
  type: map<party,enum<NONE,MATCH,NO_MATCH,INDETERMINATE,CONFLICT>>
  initial: '{A:NONE,B:NONE}'
  owner:
  - party_a_client
  - party_b_client
  visibility:
  - party_a_client
  - party_b_client
  coordinator_access: prohibited
  description: Party-local accepted decision values; coordinator must not receive or persist them.
- id: opaque_receipt_ref
  type: opaque_profile_reference
  initial: NONE
  owner:
  - selected_integration_profile
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-only
  description: Profile-defined non-enumerable reference; never a bare digest of the three decision values.
- id: result_ack
  type: map<party,record<opaque_receipt_ref,local_result_binding>>
  initial: '{A:NONE,B:NONE}'
  owner:
  - party_a_client
  - party_b_client
  visibility:
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: opaque-reference-only
  description: Per-party acknowledgment; coordinator sees only the opaque reference and normalized acknowledgment
    status.
- id: consent
  type: map<party,record_or_none>
  initial: '{A:NONE,B:NONE}'
  owner:
  - party_a_client
  - party_b_client
  visibility:
