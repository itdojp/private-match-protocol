audit_policy:
  allowed_fields: *id002
  prohibited_fields:
  - plaintext decision outcome
  - raw or normalized private input
  - matching or non-matching element
  - exact intersection count
  - secret consent payload
  - local secret
  - actual disclosure payload
  counterparty_detail_policy: return only normalized categories when detailed cause would increase inference
  response_body_policy: bounded normalized fields only; no private content echo
formalization:
  state_variable_ids:
  - phase
  - session_id
  - protocol_profile
  - policy_binding
  - intended_audience
  - participant_binding
  - policy_acceptance
  - commitment
  - commitment_pair_id
  - evaluation_started
  - evaluation_attempt_id
  - evaluation_contribution
  - accepted_evaluation_count
  - query_budget_state
  - proposed_result_state
  - accepted_result_state
  - opaque_receipt_ref
  - result_ack
  - consent
  - disclosure_profile_ref
  - disclosure_state
  - session_created_at
  - session_expires_at
  - authoritative_time
  - allowed_clock_skew
  - message_stale_threshold
  - verification_material_validity
  - next_sequence
  - accepted_message_ids
  - accepted_nonces
  - accepted_event_digests
  - normalized_responses
  - terminal_reason
  - audit_lifecycle
  initial_predicate:
  - variable: phase
    operator: equals
    value: UNINITIALIZED
  - variable: evaluation_started
    operator: equals
    value: 'false'
  - variable: accepted_evaluation_count
    operator: equals
    value: '0'
  - variable: proposed_result_state
    operator: equals
    value: '{A:NONE,B:NONE}'
  - variable: accepted_result_state
    operator: equals
    value: '{A:NONE,B:NONE}'
  - variable: query_budget_state
    operator: equals
    value: NONE
  - variable: disclosure_profile_ref
    operator: equals
    value: NONE
  - variable: disclosure_state
    operator: equals
    value: NONE
  event_relation:
  - event: create_session
    transitions:
    - TR-CREATE
  - event: bind_participant_a
    transitions:
    - TR-BIND-A-FIRST
    - TR-BIND-A-COMPLETE
  - event: bind_participant_b
    transitions:
    - TR-BIND-B-FIRST
    - TR-BIND-B-COMPLETE
  - event: accept_policy
    transitions:
    - TR-ACCEPT-POLICY-A
    - TR-ACCEPT-POLICY-B
  - event: reserve_query_budget
    transitions:
    - TR-RESERVE-BUDGET
  - event: register_commitment_a
    transitions:
    - TR-COMMIT-A-FIRST
    - TR-COMMIT-A-COMPLETE
  - event: register_commitment_b
    transitions:
    - TR-COMMIT-B-FIRST
    - TR-COMMIT-B-COMPLETE
  - event: start_evaluation
    transitions:
    - TR-START-EVALUATION
  - event: submit_evaluation_contribution
    transitions:
    - TR-SUBMIT-CONTRIBUTION-A
    - TR-SUBMIT-CONTRIBUTION-B
  - event: acknowledge_opaque_receipt_a
    transitions:
    - TR-ACK-RECEIPT-A
  - event: acknowledge_opaque_receipt_b
    transitions:
    - TR-ACK-RECEIPT-B
  - event: accept_symmetric_result
    transitions:
    - TR-ACCEPT-SYMMETRIC-RESULT
    - TR-RESULT-CONFLICT
  - event: grant_consent_a
    transitions:
    - TR-GRANT-CONSENT-A
  - event: grant_consent_b
    transitions:
    - TR-GRANT-CONSENT-B
  - event: withdraw_consent_a
    transitions:
    - TR-WITHDRAW-CONSENT-A
  - event: withdraw_consent_b
    transitions:
    - TR-WITHDRAW-CONSENT-B
  - event: authorize_disclosure_extension
    transitions:
    - TR-AUTHORIZE-DISCLOSURE-EXTENSION
  - event: record_disclosure_completion
    transitions:
    - TR-RECORD-DISCLOSURE-COMPLETION
  - event: reject_message
    transitions:
    - TR-REJECT-MESSAGE
  - event: abort_session
    transitions:
    - TR-ABORT
    - TR-EVALUATION-TIMEOUT
    - TR-PARTIAL-PARTY-FAILURE
  - event: expire_session
    transitions:
    - TR-EXPIRE
  - event: close_session
    transitions:
    - TR-CLOSE
  - event: retry_idempotent_message
    transitions:
    - TR-RETRY-EXACT-DUPLICATE-A
    - TR-RETRY-EXACT-DUPLICATE-B
  - event: request_new_evaluation_session
    transitions:
    - TR-REQUEST-NEW-EVALUATION-SESSION-A
    - TR-REQUEST-NEW-EVALUATION-SESSION-B
  next_state_relation: disjunction of enabled transition relations; stuttering is limited to exact duplicate,
    bounded rejection, and new-session guidance
  invariant_ids:
  - INV-REVEAL-SAFETY
  - INV-RESULT-SYMMETRY
  - INV-COMMITMENT-IMMUTABILITY
  - INV-SESSION-BINDING
  - INV-NO-REPLAY
  - INV-IDEMPOTENCY
  - INV-ONE-EVALUATION
  - INV-EXPIRY
  - INV-MINIMUM-DISCLOSURE
  - INV-OPAQUE-RECEIPT
  - INV-QUERY-BUDGET
  - INV-COORDINATOR-OUTCOME-CONFIDENTIALITY
  fairness_candidates:
  - weak fairness for coordinator expiry when authoritative_time reaches session_expires_at
  - weak fairness for accepted contribution processing while a nonterminal evaluation remains enabled
  - no fairness assumption that a participant must respond or consent
  bounded_model_parameters:
  - id: ParticipantCount
    type: natural
    constraint: exactly 2
  - id: MaxSessions
    type: positive natural
    constraint: bounded by model configuration
  - id: MaxMessagesPerSender
    type: positive natural
    constraint: bounded by model configuration
  - id: MaxNonces
    type: positive natural
    constraint: bounded by model configuration
  - id: MaxBudgetUnits
    type: positive natural
    constraint: at least 1 and bounded
  - id: TimeDomain
    type: finite ordered set
    constraint: includes creation, stale, timeout, consent expiry, and session expiry points
  unresolved_nondeterminism:
  - participant response, withdrawal, and failure timing
  - selected integration profile success, timeout, or partial failure
  - authoritative ordering between withdrawal and disclosure completion
  - policy choice of durations, budget limits, minimum set size, and materially changed dataset
  environment_assumptions:
  - coordinator state transitions are atomic and durable, but persistence is not implemented here
  - selected profile eventually supplies valid or invalid verification status without exposing coordinator
    plaintext outcome
  - transport authenticates sender and protects content, but transport is outside this artifact
  - authoritative_time does not roll backward
  tla_model_status: not created or model-checked in this issue
