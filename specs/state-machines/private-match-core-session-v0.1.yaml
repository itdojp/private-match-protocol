- id: audit_lifecycle
  type: sequence<normalized_audit_event>
  initial: EMPTY
  owner:
  - coordinator
  visibility:
  - coordinator
  - assurance_pipeline
  coordinator_access: read-write
  description: Approved normalized audit fields only.
events:
- id: create_session
  initiator:
  - coordinator
  verifier:
  - coordinator
  authoritative_state_owner:
  - coordinator
  visibility: &id001
  - actor: coordinator
    data:
    - normalized lifecycle
    - binding metadata
    - message replay metadata
  - actor: party_a_client
    data:
    - own normalized response
  - actor: party_b_client
    data:
    - own normalized response
  prohibited_data:
  - raw identifiers
  - normalized private inputs
  - matching or non-matching elements
  - exact intersection count
  - private attributes
  - local secrets
  - actual disclosure payload
  - plaintext decision outcome visible to coordinator
  audit_fields: &id002
  - event_id
  - authoritative_timestamp
  - actor_category_or_pseudonymous_ref
  - protocol_profile
  - policy_version
  - normalized_lifecycle_status
  - normalized_error_category
  - opaque_artifact_or_transcript_reference
  - approved_size_class
