transitions:
- id: TR-CREATE
  event: create_session
  actor: coordinator
  from_phase:
  - UNINITIALIZED
  to_phase: CREATED
  guards:
  - id: G-OPERATION-DEDUP
    predicate: new_or_exact_actor_scoped_operation
    reads:
    - operation_by_id
    - operation_by_key
    parameter_reads:
    - operation_envelope.actor_id
    - operation_envelope.canonical_operation_digest
    - operation_envelope.idempotency_key
    - operation_envelope.operation_id
    arguments:
    - operation_envelope.actor_id equals coordinator transition actor
