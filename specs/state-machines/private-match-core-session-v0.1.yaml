  - authenticated_subject_parameter.key_id
  - authenticated_subject_parameter.subject_binding_id
  - authenticated_subject_parameter.verification_material_id
  description: Atomically stores exact proposal acceptance and its trusted authenticated subject binding.
- id: G-AUTHENTICATED-SUBJECT-A
  kind: predicate
  required_parameter_reads: &id023
  - authenticated_subject_parameter.actor
  - authenticated_subject_parameter.participant_id
  - authenticated_subject_parameter.key_id
  - authenticated_subject_parameter.subject_binding_id
  - authenticated_subject_parameter.verification_material_id
  description: Consumes the complete trusted subject projection and enforces the Party slot.
- id: G-SESSION-ACCEPTED-A
  kind: predicate
  required_parameter_reads:
  - participant_binding_parameter.key_id
  - participant_binding_parameter.participant_id
  - authenticated_subject_parameter.actor
  - authenticated_subject_parameter.participant_id
  - authenticated_subject_parameter.key_id
  - authenticated_subject_parameter.subject_binding_id
  - authenticated_subject_parameter.verification_material_id
  description: Requires binding payload and current trusted subject to equal the immutable Party acceptance
    record.
- id: G-POLICY-NOT-ACCEPTED-A
  kind: predicate
  required_parameter_reads:
  - policy_acceptance_parameter.policy_id
  - policy_acceptance_parameter.policy_version
  description: Requires an empty Party slot and exact current policy ID/version.
- id: G-AUTHENTICATED-SUBJECT-B
  kind: predicate
  required_parameter_reads: *id023
  description: Consumes the complete trusted subject projection and enforces the Party slot.
- id: G-SESSION-ACCEPTED-B
  kind: predicate
  required_parameter_reads:
  - participant_binding_parameter.key_id
  - participant_binding_parameter.participant_id
  - authenticated_subject_parameter.actor
  - authenticated_subject_parameter.participant_id
  - authenticated_subject_parameter.key_id
  - authenticated_subject_parameter.subject_binding_id
  - authenticated_subject_parameter.verification_material_id
  description: Requires binding payload and current trusted subject to equal the immutable Party acceptance
    record.
- id: G-POLICY-NOT-ACCEPTED-B
  kind: predicate
  required_parameter_reads:
  - policy_acceptance_parameter.policy_id
  - policy_acceptance_parameter.policy_version
  description: Requires an empty Party slot and exact current policy ID/version.
- id: E-ACCEPT-RESULT
  kind: operation
