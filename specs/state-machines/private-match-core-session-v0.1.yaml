  actor: coordinator
  from_phase: &id021
  - UNINITIALIZED
  - CREATED
  - PARTICIPANTS_BOUND
  - COMMITMENTS_PENDING
  - COMMITTED
  - EVALUATING
  - RESULT_ACCEPTED
  - CONSENT_PENDING
