transitions:
- id: TR-CREATE
  event: create_session
  actor: coordinator
  from_phase:
  - UNINITIALIZED
  to_phase: CREATED
  guards:
  - id: G-KNOWN-PROFILE
    predicate: equals
    reads:
    - protocol_profile
    arguments:
    - private-match-core/v0.1
  - id: G-NEW-SESSION
    predicate: is_unset
    reads:
    - session_id
    arguments: []
  - id: G-CLOCK-POLICY
    predicate: valid_clock_policy
    reads:
    - authoritative_time
    - allowed_clock_skew
    - message_stale_threshold
    arguments: []
  effects:
  - id: E-CREATE
    operation: initialize_session
    writes:
    - phase
    - session_id
    - protocol_profile
    - policy_binding
    - intended_audience
    - session_created_at
    - session_expires_at
    - authoritative_time
    - next_sequence
    - accepted_message_ids
    - accepted_nonces
    - accepted_event_digests
    - normalized_responses
    arguments:
    - bind supplied versioned context
    - derive expiry from reviewed policy parameters
  - &id003
    id: E-AUDIT
    operation: append_normalized_audit
    writes:
    - audit_lifecycle
    arguments:
    - append only audit_policy.allowed_fields
  visibility: *id001
  audit_effect:
    category: normalized-protocol-lifecycle
    fields: *id002
    detail_policy: counterparty receives only the normalized category when detail would increase inference
  idempotency_behavior: exact duplicate returns the prior normalized response without another state or
    budget change
  duplicate_behavior: same message_id or nonce with a different canonical event digest is REPLAY_CONFLICT
  retry_class: new-message
  failure_code:
  - UNKNOWN_VERSION
  - UNKNOWN_FIELD
  - AUDIENCE_MISMATCH
  terminal_effect: none
  mutating: true
  extension_only: false
  privacy_notes:
  - No prohibited private, result, element, count, or payload data enters coordinator state or audit.
  related_invariants:
  - INV-SESSION-BINDING
  - INV-NO-REPLAY
  - INV-IDEMPOTENCY
  - INV-MINIMUM-DISCLOSURE
  - INV-EXPIRY
- id: TR-BIND-A-FIRST
  event: bind_participant_a
  actor: party_a_client
  from_phase:
  - CREATED
  to_phase: SAME
  guards:
  - &id004
    id: G-CONTEXT-BINDING
    predicate: event_context_matches
    reads:
    - session_id
    - protocol_profile
    - policy_binding
    - participant_binding
    - intended_audience
    - commitment_pair_id
    - evaluation_attempt_id
    arguments:
    - all fields bind to their current values; pre-commitment and pre-attempt values bind explicitly to
      NONE
  - &id005
    id: G-ORDER-AND-REPLAY
    predicate: fresh_ordered_message
    reads:
    - next_sequence
    - accepted_message_ids
    - accepted_nonces
    - accepted_event_digests
    arguments:
    - sequence equals sender next_sequence
    - nonce unused in (session_id,sender_participant_id)
    - message_id unused unless exact duplicate
  - id: G-A-UNBOUND-FIRST
    predicate: all_equal
    reads:
    - participant_binding
    arguments:
    - A=NONE
    - B=NONE
  effects:
  - id: E-BIND-A
    operation: bind_once
    writes:
    - participant_binding
    - intended_audience
    arguments:
    - bind A participant_id and key_id
  - &id006
    id: E-ACCEPT-MESSAGE
    operation: record_accepted_message
    writes:
    - next_sequence
    - accepted_message_ids
    - accepted_nonces
    - accepted_event_digests
    - normalized_responses
    arguments:
    - atomically add message_id, nonce, canonical event digest and normalized response
    - advance only the accepted sender sequence
  - *id003
  visibility: *id001
  audit_effect:
    category: normalized-protocol-lifecycle
    fields: *id002
    detail_policy: counterparty receives only the normalized category when detail would increase inference
  idempotency_behavior: exact duplicate returns the prior normalized response without another state or
    budget change
  duplicate_behavior: same message_id or nonce with a different canonical event digest is REPLAY_CONFLICT
  retry_class: new-message
  failure_code:
  - PARTICIPANT_MISMATCH
  - SESSION_MISMATCH
  - AUDIENCE_MISMATCH
  - REPLAY
  - REPLAY_CONFLICT
  - OUT_OF_ORDER
  terminal_effect: none
  mutating: true
  extension_only: false
  privacy_notes:
  - No prohibited private, result, element, count, or payload data enters coordinator state or audit.
  related_invariants:
  - INV-SESSION-BINDING
  - INV-NO-REPLAY
  - INV-IDEMPOTENCY
  - INV-MINIMUM-DISCLOSURE
- id: TR-BIND-A-COMPLETE
  event: bind_participant_a
  actor: party_a_client
  from_phase:
  - CREATED
  to_phase: PARTICIPANTS_BOUND
  guards:
  - *id004
  - *id005
  - id: G-A-UNBOUND-B-BOUND
    predicate: all_equal
    reads:
    - participant_binding
    arguments:
    - A=NONE
    - B=BOUND
  effects:
  - id: E-BIND-A-COMPLETE
    operation: bind_once
    writes:
    - participant_binding
    - intended_audience
    - phase
    arguments:
    - bind A; both participants now bound
  - *id006
  - *id003
  visibility: *id001
  audit_effect:
    category: normalized-protocol-lifecycle
    fields: *id002
    detail_policy: counterparty receives only the normalized category when detail would increase inference
  idempotency_behavior: exact duplicate returns the prior normalized response without another state or
    budget change
  duplicate_behavior: same message_id or nonce with a different canonical event digest is REPLAY_CONFLICT
  retry_class: new-message
  failure_code:
  - PARTICIPANT_MISMATCH
  - SESSION_MISMATCH
