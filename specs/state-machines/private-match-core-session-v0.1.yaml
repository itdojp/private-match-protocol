    - authoritative_timestamp
    - actor_category_or_pseudonymous_ref
    - protocol_profile
    - policy_version
    - normalized_lifecycle_status
    - normalized_error_category
    - opaque_artifact_or_transcript_reference
    - approved_size_class
    detail_policy: counterparty receives only the normalized category when detail would increase inference
  idempotency_behavior: exact actor-bound operation_envelope duplicate requires both independent indexes
    to agree and returns the prior normalized operation response without another state, budget, release,
    or audit change
  duplicate_behavior: existing operation_id with a different key or canonical operation digest, existing
