- id: TR-BIND-A-FIRST
  event: bind_participant_a
  actor: party_a_client
  from_phase:
  - CREATED
  to_phase: SAME
  guards:
  - &id004
    id: G-CONTEXT-BINDING
    predicate: event_context_matches
    reads:
    - session_id
    - protocol_profile
    - policy_binding
    - participant_binding
    - intended_audience
    - commitment_pair_id
    - evaluation_attempt_id
    arguments:
    - all fields bind to their current values; pre-commitment and pre-attempt values bind explicitly to
      NONE
    parameter_reads: []
  - &id005
    id: G-ORDER-AND-REPLAY
    predicate: fresh_ordered_message
    reads:
    - next_sequence
    - accepted_message_ids
    - accepted_nonces
    - accepted_event_digests
    arguments:
    - sequence equals sender next_sequence
    - nonce unused in (session_id,sender_participant_id)
    - message_id unused unless exact duplicate
    parameter_reads: []
  - id: G-A-UNBOUND-FIRST
    predicate: all_equal
    reads:
    - participant_binding
    arguments:
    - A=NONE
    - B=NONE
    parameter_reads: []
  - id: G-MESSAGE-TIME-VALID
    predicate: message_time_within_policy
    reads:
    - authoritative_time
    - allowed_clock_skew
    - message_stale_threshold
    parameter_reads:
    - replay_envelope.issued_at
    arguments:
    - authoritative_time - message_stale_threshold <= issued_at
    - issued_at <= authoritative_time + allowed_clock_skew
    - client issued_at is not authoritative
  effects:
  - id: E-BIND-A
    operation: bind_once
    writes:
    - participant_binding
    - intended_audience
    arguments:
    - bind A participant_id and key_id
    parameter_reads: []
  - &id006
