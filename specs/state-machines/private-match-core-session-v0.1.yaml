- id: session_expires_at
  type: authoritative_timestamp
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  coordinator_access: read-write
  description: Policy-derived authoritative expiry.
- id: authoritative_time
  type: monotonic_coordinator_time
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  coordinator_access: read-write
  description: Nondecreasing transition clock; client time is never authoritative.
- id: allowed_clock_skew
  type: policy_duration
  initial: POLICY_PARAMETER
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  coordinator_access: read-write
  description: Non-negative bounded tolerance for auxiliary client timestamps.
- id: message_stale_threshold
  type: policy_duration
  initial: POLICY_PARAMETER
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  coordinator_access: read-write
