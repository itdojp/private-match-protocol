envelope_binding_contracts:
- id: BIND-OPERATION-ACTOR
  delivery_class: coordinator_command
  parameter_path: operation_envelope.actor_id
  operator: equals
  state_path: transition.actor
  failure_code: REPLAY_CONFLICT
- id: BIND-CALLBACK-PROFILE-ID
  delivery_class: profile_callback
  parameter_path: profile_callback_envelope.profile_id
  operator: equals
  state_path: state.selected_integration_profile_binding.profile_id
  failure_code: REPLAY_CONFLICT
- id: BIND-CALLBACK-PROFILE-VERSION
  delivery_class: profile_callback
  parameter_path: profile_callback_envelope.profile_version
  operator: equals
  state_path: state.selected_integration_profile_binding.profile_version
  failure_code: REPLAY_CONFLICT
- id: BIND-CALLBACK-PROFILE-INSTANCE
  delivery_class: profile_callback
  parameter_path: profile_callback_envelope.profile_instance_id
  operator: equals
  state_path: state.selected_integration_profile_binding.profile_instance_id
  failure_code: REPLAY_CONFLICT
- id: BIND-CALLBACK-SESSION
  delivery_class: profile_callback
  parameter_path: profile_callback_envelope.session_id
  operator: equals
  state_path: state.session_id
  failure_code: REPLAY_CONFLICT
- id: BIND-CALLBACK-ATTEMPT
  delivery_class: profile_callback
  parameter_path: profile_callback_envelope.evaluation_attempt_id
  operator: equals
  state_path: state.evaluation_attempt_id
  failure_code: REPLAY_CONFLICT
failure_projection_semantics:
  detail_state_variable: terminal_failure_code
  party_state_variable: party_terminal_category
  mapping_source: failure_taxonomy.party_error_category
  atomic_terminal_projection: true
  normalized_response_allowed_fields:
  - normalized_lifecycle_status
  - party_error_category
  - opaque_artifact_or_transcript_reference
  normalized_response_prohibited_fields:
  - terminal_failure_code
  - raw failure_code
  - private failure detail
  public_audit_prohibited_fields:
  - terminal_failure_code
  - raw failure_code
  - private failure detail
  description: Coordinator/private assurance retain detail; Parties receive only the reviewed normalized
    category.
canonical_transcript_semantics:
  ordering_authority: coordinator
  canonicalization: RFC 8785 JCS over strict I-JSON values; json.dumps(sort_keys=True) is not conformant
  digest_algorithm: SHA-256
  domain_encoding: two-byte unsigned big-endian ASCII-label length followed by the exact ASCII label
  payload_domain: private-match-payload/v0.1
  message_domain: private-match-message/v0.1
  transcript_domain: private-match-transcript/v0.1
  timer_event_domain: private-match-timer-event/v0.1
  genesis_domain: private-match-transcript-genesis/v0.1
  genesis_digest: sha256:200b23451f65992feacb88e782a16afb595bc32d386a4347bb318892cde2ff3c
  event_index_encoding: unsigned 64-bit big-endian integer in range 1..2^64-1
  external_message_digest_sources:
    party_message: replay_envelope.canonical_message_digest
    coordinator_command: operation_envelope.canonical_message_digest
    profile_callback: profile_callback_envelope.canonical_message_digest
  timer_digest_source: time_advance_parameter.canonical_event_digest
  append_rule: SHA-256(domain(transcript) || prior_digest_bytes || uint64be(accepted_event_index) || accepted_event_digest_bytes)
  included_relations: accepted mutating party messages, coordinator commands, profile callbacks, and timer
    events, once in coordinator authoritative order
  excluded_relations: rejected messages, conflicting duplicates, exact duplicates, derived notices, local
    guidance, and nonmutating timer threshold no-op re-evaluation
  result_confidentiality: digest inputs bind opaque receipt and routing metadata; no bare hash of MATCH,
    NO_MATCH, or INDETERMINATE and no coordinator-readable plaintext result
commitment_pair_derivation:
  authority: coordinator
  domain: private-match-commitment-pair/v0.1
  canonicalization: RFC 8785 JCS
  digest_algorithm: SHA-256
  output_format: sha256:<64 lowercase hex>
  slot_order:
  - party_a
  - party_b
  canonical_fields:
  - protocol_profile
  - policy_binding
  - session_id
  - participant_binding.party_a
  - participant_binding.party_b
  - selected_integration_profile_binding
  - commitment_a
  - commitment_b
  first_commitment_effect: store only the Party-slot opaque commitment; commitment_pair_id remains NONE
  second_commitment_effect: atomically store the second commitment and derive commitment_pair_id exactly
    once
  party_supplied_identifier: forbidden
  claim_boundary: Identity binding only; it proves neither commitment truth, input completeness, PET security,
    nor production readiness.
cross_message_binding_semantics:
  atomic_failure_rule: A failed guard mutates no state, dedup index, transcript, budget, or audit record.
  rules:
  - id: XMSG-SESSION-ACCEPTANCE-SUBJECT
    message_types:
    - session_acceptance
    - participant_binding
    state_reads:
    - session_acceptance
    - participant_binding
    required_parameter_paths:
    - authenticated_subject_parameter.actor
    - authenticated_subject_parameter.participant_id
    - authenticated_subject_parameter.key_id
    - authenticated_subject_parameter.subject_binding_id
    - authenticated_subject_parameter.verification_material_id
    - participant_binding_parameter.participant_id
    - participant_binding_parameter.key_id
    rule: Binding must exactly match the trusted authenticated subject stored by that Party acceptance;
      peer slots and in-session key rotation are forbidden.
  - id: XMSG-POLICY-ACCEPTANCE
    message_types:
    - policy_acceptance
    state_reads:
    - policy_binding
    - policy_acceptance
    required_parameter_paths:
    - policy_acceptance_parameter.policy_id
    - policy_acceptance_parameter.policy_version
    - policy_acceptance_parameter.acceptance_digest
    rule: Each Party immutable acceptance record must equal the current policy ID/version; one Party never
      satisfies the peer slot.
  - id: XMSG-COMMITMENT-PAIR
    message_types:
    - commitment_registration
    - evaluation_start
    state_reads:
    - commitment
    - commitment_pair_id
    - protocol_profile
    - policy_binding
    - session_id
    - participant_binding
    - selected_integration_profile_binding
    required_parameter_paths:
    - commitment_parameter.opaque_commitment
    rule: The second accepted commitment derives the pair identity exactly once in canonical A/B order;
      evaluation requires that derived identity.
  - id: XMSG-RECEIPT-ACCEPTANCE
    message_types:
    - evaluation_contribution
    - opaque_receipt_ack
    - result_acceptance_notice
    state_reads:
    - evaluation_contribution
    - result_ack
    - opaque_receipt_ref
    - selected_integration_profile_binding
    - evaluation_attempt_id
    required_parameter_paths:
    - evaluation_contribution_parameter.contribution_ref
    - opaque_receipt_parameter.opaque_receipt_ref
    - opaque_receipt_parameter.acknowledgment_status
    - opaque_receipt_parameter.profile_evidence_ref
    rule: Both contributions precede Party acknowledgments; both Party references and statuses plus the
      profile callback reference/status/profile-session-attempt binding must agree before result acceptance.
  - id: XMSG-CONSENT-BINDING
    message_types:
    - consent_grant
    state_reads:
    - opaque_receipt_ref
    - consent
    - disclosure_profile_ref
    - participant_binding
    - intended_audience
    - authoritative_time
    required_parameter_paths:
    - consent_binding_parameter.opaque_receipt_ref
    - consent_binding_parameter.disclosure_profile_id
    - consent_binding_parameter.disclosure_profile_version
    - consent_binding_parameter.scope
    - consent_binding_parameter.audience
    - consent_binding_parameter.issued_at
    - consent_binding_parameter.expires_at
    - consent_binding_parameter.consent_nonce
    - consent_binding_parameter.consent_artifact_digest
    rule: Consent binds the accepted receipt and exact shared profile/scope/audience during its valid
      interval; Party slots, nonces, and digests are immutable.
session_acceptance_semantics:
  proposal_binding: create_session binds one exact proposal digest and one abstract reviewed integration-profile
    binding; neither can change after first acceptance
  party_acceptance: A and B acceptance slots separately and immutably bind proposal digest, acceptance
    digest, authenticated participant, key, subject-binding ID, and verification-material ID.
  binding_prerequisite: Participant binding is enabled only when payload participant/key and the current
    trusted authentication projection exactly equal that Party acceptance record.
  downgrade_prevention: session_acceptance and participant_binding map to separate events and transitions;
    neither substitutes for the other
  trusted_subject_projection: Derived only after reviewed verification-material, sender, key, subject,
    status, and authoritative-time validation; it is not a caller-controlled event field.
  key_rotation_policy: No v0.1 in-session key/material rotation transition exists; a changed key, material,
    or subject binding fails closed and requires a new session.
