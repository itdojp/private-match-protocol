- id: disclosure_profile_ref
  type: versioned_identifier_or_none
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Reference to a separately reviewed disclosure profile; NONE in core.
- id: disclosure_state
  type: enum<NONE,CONSENT_PENDING,AUTHORIZED,COMPLETED,WITHDRAWN>
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - assurance_pipeline
  coordinator_access: read-write
  description: Normalized extension lifecycle; does not contain a reveal payload.
- id: session_created_at
  type: authoritative_timestamp
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  coordinator_access: read-write
