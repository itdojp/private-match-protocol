audit_policy:
  allowed_fields: *id003
  prohibited_fields:
  - plaintext decision outcome
  - raw or normalized private input
  - matching or non-matching element
  - exact intersection count
  - secret consent payload
  - local secret
  - actual disclosure payload
  - raw failure code
  counterparty_detail_policy: return only normalized categories when detailed cause would increase inference
  response_body_policy: bounded normalized fields only; no private content echo
