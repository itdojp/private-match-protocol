  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - assurance_pipeline
  coordinator_access: read-write
  description: Normalized terminal reason without private or outcome detail.
- id: audit_lifecycle
  type: sequence<normalized_audit_event>
  initial: EMPTY
  owner:
  - coordinator
  visibility:
  - coordinator
  - assurance_pipeline
  coordinator_access: read-write
  description: Approved normalized audit fields only.
- id: evaluation_deadline
  type: authoritative_timestamp_or_none
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - selected_integration_profile
  coordinator_access: read-write
  description: Policy-derived deadline set atomically at start_evaluation and compared against authoritative_time.
- id: accepted_operation_ids
  type: map<actor_id,operation_id_map>
  initial: '{}'
  owner:
  - coordinator
  visibility:
  - coordinator
  coordinator_access: read-write
  description: Actor-scoped coordinator operation IDs and prior normalized operation responses.
- id: accepted_operation_digests
  type: map<actor_id,operation_digest_map>
  initial: '{}'
  owner:
  - coordinator
  visibility:
  - coordinator
  coordinator_access: read-write
  description: Canonical operation digests for exact coordinator-command duplicate equality.
- id: normalized_operation_responses
  type: map<actor_operation_id,normalized_response>
  initial: '{}'
  owner:
  - coordinator
  visibility:
  - coordinator
  coordinator_access: read-write
  description: Prior bounded response for an exact operation-envelope duplicate.
- id: accepted_profile_callback_ids
  type: map<profile_callback_domain,callback_id_map>
  initial: '{}'
  owner:
  - coordinator
