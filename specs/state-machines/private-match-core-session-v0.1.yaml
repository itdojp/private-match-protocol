schema_version: '0.1'
record_type: session-state-machine
artifact:
  id: private-match-core-session-v0.1
  status: draft
  protocol_profile: private-match-core/v0.1
  owner: ITDO Inc.
  decision_output:
  - MATCH
  - NO_MATCH
  - INDETERMINATE
  created_at: '2026-07-21'
  reviewed_at: null
  next_review_at: '2026-10-21'
  compatibility: no stable or candidate compatibility commitment
scope:
  includes:
  - abstract session lifecycle and authoritative state ownership
  - participant, policy, commitment, attempt, replay, ordering, budget, result, consent, and expiry semantics
  - extension guards for separately reviewed disclosure profiles
  - failure taxonomy and TLA+ readiness mapping
  - canonical accepted-event transcript head and event-index binding
  excludes:
  - PET selection or cryptographic implementation
  - transport-specific wire framing, production API fields, or persistence encoding
  - transport, persistence, or production coordinator implementation
  - actual identity, private-data, or disclosure payload
  - TLA+ model checking or any production/security certification
  core_disclosure_profile: NONE
  actual_disclosure_completion: unreachable in private-match-core/v0.1
authority_model:
  coordinator_authoritative_for:
  - session state
  - participant and policy binding
  - replay and sequence state
  - query-budget reservation and consumption
  - expiry and authoritative event ordering
  - normalized audit lifecycle
  coordinator_permitted_state:
  - normalized lifecycle and error category
  - participant, policy, session, message, nonce, sequence, and expiry bindings
  - opaque receipt reference
  - approved opaque artifact or transcript references
  - approved size class
  coordinator_prohibited_state:
  - MATCH, NO_MATCH, or INDETERMINATE plaintext outcome
  - raw identifiers or normalized private inputs
  - matching or non-matching elements
  - exact intersection count
  - private attributes
  - local secrets
  - actual disclosure payload
  opaque_receipt_reference:
    construction_policy: selected versioned integration profile defines a high-entropy or confidential
      opaque reference
    coordinator_treatment: compare and record as opaque bytes without deriving the result
    required_properties:
    - not enumerable over the three decision values
    - bound to session, participants, policy, commitment pair, evaluation attempt, and profile version
    - same reference acknowledged by both parties
    forbidden_constructions:
    - hash(MATCH)
    - hash(NO_MATCH)
    - hash(INDETERMINATE)
    - any bare low-entropy digest dictionary over the decision output
actors:
- id: party_a_client
  role: Party A local protocol client and private-input boundary
  trust_assumptions:
  - protects Party A local input before protocol preparation
  - does not establish that Party A input is truthful, complete, current, or authorized
  authority:
  - Party A local result value
  - Party A consent artifact
  residual_visibility:
  - public protocol and policy binding
  - own commitment and contribution
  - opaque receipt reference
  - own local decision value
  - normalized lifecycle and error category
  prohibited_data:
  - Party B raw or normalized private input
  - matching or non-matching elements
  - exact intersection count
  - Party B private attributes
- id: party_b_client
  role: Party B local protocol client and private-input boundary
  trust_assumptions:
  - protects Party B local input before protocol preparation
  - does not establish that Party B input is truthful, complete, current, or authorized
  authority:
  - Party B local result value
  - Party B consent artifact
  residual_visibility:
  - public protocol and policy binding
  - own commitment and contribution
  - opaque receipt reference
  - own local decision value
  - normalized lifecycle and error category
  prohibited_data:
  - Party A raw or normalized private input
  - matching or non-matching elements
  - exact intersection count
  - Party A private attributes
- id: coordinator
  role: Authoritative session, ordering, replay, budget, expiry, and normalized audit coordinator
  trust_assumptions:
  - atomically applies accepted session-state transitions
  - does not receive or derive the plaintext decision outcome
  - outcome confidentiality requires evidence from a later selected integration profile
  authority:
  - session lifecycle
  - participant and policy binding
  - replay and sequence state
  - query-budget reservation and consumption
  - expiry
  - normalized audit lifecycle
  residual_visibility:
  - session and participant pseudonymous references
  - protocol and policy versions
  - message identifiers, nonces, sequences, timing, and approved size class
  - opaque receipt reference
  - normalized lifecycle and error category
  prohibited_data:
  - plaintext MATCH, NO_MATCH, or INDETERMINATE outcome
  - raw or normalized private input
  - matching or non-matching elements
  - exact intersection count
  - private attributes
  - actual disclosure payload
  - local secrets
- id: selected_integration_profile
  role: Abstract, separately reviewed profile that verifies contributions and produces protected result
    artifacts
  trust_assumptions:
  - no concrete PET is selected by this state-machine artifact
  - profile-specific security, collusion, setup, and outcome-confidentiality properties remain unresolved
  authority:
  - profile-specific contribution verification
  - profile-defined opaque receipt-reference construction
  - profile-specific evidence for symmetric local result derivation
  residual_visibility:
  - only data explicitly permitted by the selected versioned profile
  - protocol, policy, participant, commitment-pair, and attempt binding
  prohibited_data:
  - unprofiled raw or normalized private input
  - unapproved exact count or element disclosure
  - silent fallback to a mock or unknown profile
- id: service_operator
  role: Operational administrator with approved normalized status access
  trust_assumptions:
  - operational access is separate from participant and integration-profile boundaries
  authority:
  - service administration outside protocol semantics
  residual_visibility:
  - aggregate service metrics
  - approved normalized audit lifecycle
  prohibited_data:
  - plaintext decision outcome
  - raw or normalized private input
  - matching elements
  - consent secret material
  - actual disclosure payload
- id: assurance_pipeline
  role: Produces private evidence and reviewed public-safe evidence metadata
  trust_assumptions:
  - does not convert structural validation into a security or production claim
  authority:
  - evidence status and provenance within a separately governed assurance process
  residual_visibility:
  - artifact digests
  - normalized check status
  - tool and protocol versions
  - approved public-safe configuration
  prohibited_data:
  - raw evidence containing private input
  - customer identifiers
  - plaintext decision outcome
  - secrets or internal topology in public output
- id: network_observer
  role: Passive observer of transport metadata
  trust_assumptions:
  - transport encryption is required but not implemented or established by this artifact
  authority: []
  residual_visibility:
  - network endpoints visible at the transport layer
  - timing, frequency, duration, and byte counts
  prohibited_data:
  - protocol plaintext under the assumed transport-confidentiality boundary
- id: malicious_participant
  role: Participant attempting inference, omission, replay, reordering, or policy bypass
  trust_assumptions:
  - may choose, omit, fabricate, or adapt inputs
  - may replay, reorder, duplicate, tamper, or collude unless a later profile excludes it
  authority:
  - its own local input choice within external authorization
  residual_visibility:
  - the same bounded participant-visible data as its compromised party role
  prohibited_data:
  - counterparty raw or normalized private input
  - matching elements
  - exact intersection count
  - unauthorized disclosure payload
event_parameter_catalog:
- id: session_context
  type: record<session_id,protocol_profile,policy_binding,participant_binding,intended_audience,commitment_pair_id,evaluation_attempt_id,selected_integration_profile_binding>
  description: Exact current binding; pre-stage values are explicitly NONE.
  fields:
  - id: session_id
    type: opaque_identifier
    required: true
    description: Current session binding.
  - id: protocol_profile
    type: profile_id_and_version
    required: true
    description: Exact protocol profile binding.
  - id: policy_binding
    type: policy_id_and_version
    required: true
    description: Exact policy binding.
  - id: participant_binding
    type: party_a_and_b_binding
    required: true
    description: Exact participant and key bindings.
  - id: intended_audience
    type: audience_set
    required: true
    description: Exact intended audience binding.
  - id: commitment_pair_id
    type: opaque_identifier_or_none
    required: true
    description: Current commitment pair or explicit NONE.
  - id: evaluation_attempt_id
    type: opaque_identifier_or_none
    required: true
    description: Current evaluation attempt or explicit NONE.
  - id: selected_integration_profile_binding
    type: profile_binding_or_none
    required: true
    description: Current reviewed profile binding or explicit NONE before session creation.
- id: replay_envelope
  type: record<sender_participant_id,message_id,nonce,sequence,issued_at,canonical_event_digest,prior_transcript_digest,canonical_message_digest>
  description: 'Party-message ordering, issued time, and exact-duplicate identity; wire representation
    is defined by the Issue #5 draft message contract.'
  fields:
  - id: sender_participant_id
    type: opaque_participant_identifier
    required: true
    description: Authenticated sender binding.
  - id: message_id
    type: opaque_identifier
    required: true
    description: Sender-domain message identifier.
  - id: nonce
    type: opaque_nonce
    required: true
    description: Nonce unique in the participant replay domain.
  - id: sequence
    type: nonnegative_integer
    required: true
    description: Per-sender monotonic sequence.
  - id: issued_at
    type: timestamp
    required: true
    description: Client-issued time used only for stale/future checks.
  - id: canonical_event_digest
    type: sha256_digest
    required: true
    description: Digest binding every envelope identity field and canonical event payload.
  - id: prior_transcript_digest
    type: sha256_digest
    required: true
    description: Accepted transcript head before this Party message; must equal coordinator state.
  - id: canonical_message_digest
    type: sha256_digest
    required: true
    description: RFC 8785 and domain-separated message digest derived after complete authentication-input
      validation.
- id: clock_policy
  type: record<authoritative_time,session_expiry,allowed_skew,stale_threshold,evaluation_timeout,maximum_jump>
  description: Typed policy parameters, not fixed business durations.
  fields:
  - id: authoritative_time
    type: timestamp
    required: true
    description: Initial coordinator-authoritative time.
  - id: session_expiry
    type: timestamp
    required: true
    description: Session expiry derived from reviewed policy.
  - id: allowed_skew
    type: nonnegative_duration
    required: true
    description: Permitted future client-time skew.
  - id: stale_threshold
    type: nonnegative_duration
    required: true
    description: Party-message staleness threshold.
  - id: evaluation_timeout
    type: positive_duration
    required: true
    description: Evaluation deadline offset.
  - id: maximum_jump
    type: nonnegative_duration
    required: true
    description: Reviewed finite upper bound for one authoritative-time proposal; clients cannot override it.
- id: participant_binding_parameter
  type: record<participant_id,key_id>
  description: One party binding for bind_participant_a or bind_participant_b.
  fields:
  - id: participant_id
    type: opaque_participant_identifier
    required: true
    description: Party identifier for the bound slot.
  - id: key_id
    type: opaque_key_identifier
    required: true
    description: Verification key identifier for the bound slot.
- id: policy_acceptance_parameter
  type: record<policy_id,policy_version,acceptance_digest>
  description: Acceptance of the exact policy binding.
  fields:
  - id: policy_id
    type: opaque_policy_identifier
    required: true
    description: Accepted policy identifier.
  - id: policy_version
    type: version
    required: true
    description: Accepted policy version.
  - id: acceptance_digest
    type: sha256_digest
    required: true
    description: Digest of the reviewed acceptance artifact.
- id: query_budget_authorization_ref
  type: opaque_reference
  description: Reviewed authorization reference; no private policy detail.
  fields:
  - id: authorization_ref
    type: opaque_reference
    required: true
    description: Opaque reviewed budget authorization reference.
- id: commitment_parameter
  type: opaque_commitment
  description: Profile-defined commitment; no raw or normalized input.
  fields:
  - id: opaque_commitment
    type: opaque_profile_commitment
    required: true
    description: Commitment without raw or normalized input.
- id: evaluation_attempt_parameter
  type: opaque_identifier
  description: Single attempt identifier for the commitment pair.
  fields:
  - id: evaluation_attempt_id
    type: opaque_identifier
    required: true
    description: Single attempt identifier for the commitment pair.
- id: evaluation_contribution_parameter
  type: opaque_profile_contribution
  description: Profile-defined contribution or reference.
  fields:
  - id: contribution_ref
    type: opaque_profile_reference
    required: true
    description: Profile-defined contribution or reference.
- id: local_result_parameter
  type: enum<MATCH,NO_MATCH,INDETERMINATE>
  description: Party-local value; prohibited from coordinator visibility.
  fields:
  - id: local_result
    type: enum<MATCH,NO_MATCH,INDETERMINATE>
    required: true
    description: Party-local decision value, never coordinator-visible.
- id: opaque_receipt_parameter
  type: record<opaque_receipt_ref,acknowledgment_status,profile_evidence_ref>
  description: Opaque receipt acknowledgment/callback binding; contains no plaintext result.
  fields:
  - id: opaque_receipt_ref
    type: opaque_high_entropy_reference
    required: true
    description: Profile-defined opaque receipt reference.
  - id: acknowledgment_status
    type: enum<ACKNOWLEDGED,BOTH_ACKNOWLEDGED>
    required: true
    description: Delivery-specific normalized acknowledgment status.
  - id: profile_evidence_ref
    type: opaque_profile_reference
    required: true
    description: Opaque profile evidence reference bound to the current profile/session/attempt.
- id: consent_binding_parameter
  type: record<session,participants,receipt,profile,scope,audience,issued_at,expires_at,nonce,digest>
  description: Exact result-bound consent metadata; no disclosure payload.
  fields:
  - id: session_id
    type: opaque_identifier
    required: true
    description: Session bound by consent.
  - id: participant_set
    type: party_a_and_b_binding
    required: true
    description: Participant set bound by consent.
  - id: opaque_receipt_ref
    type: opaque_high_entropy_reference
    required: true
    description: Accepted receipt bound by consent.
  - id: disclosure_profile_id
    type: opaque_profile_identifier
    required: true
    description: Reviewed disclosure profile identifier.
  - id: disclosure_profile_version
    type: version
    required: true
    description: Reviewed disclosure profile version.
  - id: scope
    type: exact_scope
    required: true
    description: Exact authorized disclosure scope.
  - id: audience
    type: audience_set
    required: true
    description: Exact recipient or intended audience.
  - id: issued_at
    type: timestamp
    required: true
    description: Consent issuance time.
  - id: expires_at
    type: timestamp
    required: true
    description: Consent expiry time.
  - id: consent_nonce
    type: opaque_nonce
    required: true
    description: Consent artifact nonce.
  - id: consent_artifact_digest
    type: sha256_digest
    required: true
    description: Digest of the complete consent artifact.
- id: disclosure_extension_parameter
  type: record<profile_id,profile_version,scope,audience,authorization_ref>
  description: Separately reviewed extension reference; none exists in core.
  fields:
  - id: profile_id
    type: opaque_profile_identifier
    required: true
    description: Separately reviewed disclosure profile identifier.
  - id: profile_version
    type: version
    required: true
    description: Separately reviewed disclosure profile version.
  - id: scope
    type: exact_scope
    required: true
    description: Exact disclosure scope.
  - id: audience
    type: audience_set
    required: true
    description: Exact disclosure audience.
  - id: authorization_ref
    type: opaque_reference
    required: true
    description: Record-scoped extension authorization reference.
- id: normalized_failure_parameter
  type: failure_code
  description: Coordinator-only detailed failure code from the declared taxonomy; Parties receive only
    its reviewed party_error_category projection.
  fields:
  - id: failure_code
    type: declared_failure_code
    required: true
    description: Coordinator-only detailed failure selected from the taxonomy.
- id: operation_envelope
  type: record<actor_id,operation_id,canonical_operation_digest,idempotency_key,prior_transcript_digest,canonical_message_digest>
  description: Coordinator-command identity in an actor-scoped operation domain; separate from the participant
    replay envelope.
  fields:
  - id: actor_id
    type: actor_identifier
    required: true
    description: Must equal the coordinator transition actor.
  - id: operation_id
    type: opaque_identifier
    required: true
    description: Actor-scoped operation identifier.
  - id: canonical_operation_digest
    type: sha256_digest
    required: true
    description: Canonical command and binding digest.
  - id: idempotency_key
    type: opaque_identifier
    required: true
    description: Independently unique actor-scoped idempotency key.
  - id: prior_transcript_digest
    type: sha256_digest
    required: true
    description: Accepted transcript head before this coordinator command.
  - id: canonical_message_digest
    type: sha256_digest
    required: true
    description: RFC 8785 and domain-separated coordinator-command message digest.
- id: profile_callback_envelope
  type: record<profile_id,profile_version,profile_instance_id,callback_id,canonical_callback_digest,idempotency_key,session_id,evaluation_attempt_id,prior_transcript_digest,canonical_message_digest>
  description: Reviewed profile callback identity bound to profile instance, session, and evaluation attempt.
  fields:
  - id: profile_id
    type: opaque_profile_identifier
    required: true
    description: Must equal the selected profile identifier.
  - id: profile_version
    type: version
    required: true
    description: Must equal the selected profile version.
  - id: profile_instance_id
    type: opaque_identifier
    required: true
    description: Must equal the selected profile instance.
  - id: callback_id
    type: opaque_identifier
    required: true
    description: Callback identifier in the bound callback domain.
  - id: canonical_callback_digest
    type: sha256_digest
    required: true
    description: Canonical callback and binding digest.
  - id: idempotency_key
    type: opaque_identifier
    required: true
    description: Independently unique callback-domain idempotency key.
  - id: session_id
    type: opaque_identifier
    required: true
    description: Must equal current session_id.
  - id: evaluation_attempt_id
    type: opaque_identifier
    required: true
    description: Must equal current evaluation_attempt_id.
  - id: prior_transcript_digest
    type: sha256_digest
    required: true
    description: Accepted transcript head before this profile callback.
  - id: canonical_message_digest
    type: sha256_digest
    required: true
    description: RFC 8785 and domain-separated profile-callback message digest.
- id: time_advance_parameter
  type: record<new_authoritative_time,reason_or_source_class,prior_transcript_digest,canonical_event_digest>
  description: Bounded coordinator-clock/environment time proposal; client time is never authoritative.
  fields:
  - id: new_authoritative_time
    type: timestamp
    required: true
    description: Proposed coordinator-authoritative time.
  - id: reason_or_source_class
    type: reviewed_clock_source_class
    required: true
    description: Bounded clock source/reason category.
  - id: prior_transcript_digest
    type: sha256_digest
    required: true
    description: Accepted transcript head before a mutating timer relation.
  - id: canonical_event_digest
    type: sha256_digest
    required: true
    description: Domain-separated digest of the canonical authoritative timer event.
- id: session_proposal_parameter
  fields:
  - &id001
    id: proposal_digest
    type: sha256_digest
    required: true
    description: Exact session proposal digest bound at creation and accepted by each Party.
  - id: selected_integration_profile_binding
    type: record<profile_id,profile_version,profile_instance_id>
    required: true
    description: Abstract reviewed profile binding established atomically by session creation; no PET
      is selected.
  type: record<proposal_digest,selected_integration_profile_binding>
  description: Exact proposal and abstract reviewed profile binding supplied at session creation.
- id: session_acceptance_parameter
  fields:
  - *id001
  - id: acceptance_digest
    type: sha256_digest
    required: true
    description: Party-specific immutable acceptance artifact digest.
  type: record<proposal_digest,acceptance_digest>
  description: Party-specific exact-proposal acceptance evidence.
- id: authenticated_subject_parameter
  type: trusted_record<actor,participant_id,key_id,subject_binding_id,verification_material_id>
  description: Trusted projection produced only after successful verification-material, sender, key, subject,
    and validity checks; it is not a wire-controlled field.
  fields:
  - id: actor
    type: actor_id
    required: true
    description: Authenticated actor from the reviewed verification-material subject.
  - id: participant_id
    type: opaque_participant_identifier
    required: true
    description: Authenticated Party participant identifier; NONE only for non-Party subjects.
  - id: key_id
    type: opaque_key_identifier
    required: true
    description: Authenticated key identifier shared by sender, authentication metadata, and material.
  - id: subject_binding_id
    type: opaque_identifier
    required: true
    description: Stable reviewed subject-binding registry identifier.
  - id: verification_material_id
    type: opaque_identifier
    required: true
    description: Validated material identifier used for this event.
- id: consent_withdrawal_parameter
  type: record<consent_nonce,consent_artifact_digest,reason_category>
  description: Party withdrawal reference for the current active consent slot.
  fields:
  - id: consent_nonce
    type: opaque_nonce
    required: true
    description: Nonce of the active consent being withdrawn.
  - id: consent_artifact_digest
    type: sha256_digest
    required: true
    description: Digest of the active consent being withdrawn.
  - id: reason_category
    type: normalized_reason_category
    required: true
    description: Bounded withdrawal reason category.
phases:
- id: UNINITIALIZED
  terminal: false
  core_reachable: true
  description: No session record exists; only create_session is enabled.
  allowed_terminal_operations: []
- id: CREATED
  terminal: false
  core_reachable: true
  description: Session identity, profile, policy, audience, clocks, and replay domains are initialized.
  allowed_terminal_operations: []
- id: PARTICIPANTS_BOUND
  terminal: false
  core_reachable: true
  description: Both participants and key identifiers are bound; policy acknowledgments may be accepted.
  allowed_terminal_operations: []
- id: COMMITMENTS_PENDING
  terminal: false
  core_reachable: true
  description: Query budget is reserved and commitments may be registered.
  allowed_terminal_operations: []
- id: COMMITTED
  terminal: false
  core_reachable: true
  description: Both immutable commitments and their commitment-pair identifier are registered.
  allowed_terminal_operations: []
- id: EVALUATING
  terminal: false
  core_reachable: true
  description: The first evaluation attempt has atomically consumed its budget reservation.
  allowed_terminal_operations: []
- id: RESULT_ACCEPTED
  terminal: false
  core_reachable: true
  description: Both parties accepted one symmetric local result bound to the same opaque receipt reference.
  allowed_terminal_operations: []
- id: CONSENT_PENDING
  terminal: false
  core_reachable: true
  description: At least one result-bound disclosure consent is registered; no disclosure is authorized
    yet.
  allowed_terminal_operations: []
- id: DISCLOSURE_AUTHORIZED
  terminal: false
  core_reachable: false
  description: A separately reviewed disclosure extension is authorized; unreachable in the core profile.
  allowed_terminal_operations: []
- id: CLOSED
  terminal: true
  core_reachable: true
  description: The session is closed; only exact replay and non-mutating rejection/query semantics remain.
  allowed_terminal_operations:
  - reject_message
  - request_new_evaluation_session
  - retry_idempotent_message
  - retry_idempotent_operation
  - retry_idempotent_profile_callback
- id: ABORTED
  terminal: true
  core_reachable: true
  description: The session failed closed; a new session is required for another evaluation.
  allowed_terminal_operations:
  - reject_message
  - request_new_evaluation_session
  - retry_idempotent_message
  - retry_idempotent_operation
  - retry_idempotent_profile_callback
- id: EXPIRED
  terminal: true
  core_reachable: true
  description: Authoritative session expiry has passed; no mutating protocol transition is permitted.
  allowed_terminal_operations:
  - reject_message
  - request_new_evaluation_session
  - retry_idempotent_message
  - retry_idempotent_operation
  - retry_idempotent_profile_callback
state_variables:
- id: phase
  type: enum<phase_id>
  initial: UNINITIALIZED
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - assurance_pipeline
  coordinator_access: read-write
  description: Normalized lifecycle phase; never encodes the decision outcome.
- id: session_id
  type: opaque_identifier
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Unique session binding.
- id: session_proposal_digest
  type: sha256_digest_or_none
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  coordinator_access: read-write
  description: Exact proposal digest; immutable after the first Party acceptance.
- id: session_acceptance
  type: map<party,record<proposal_digest,acceptance_digest,participant_id,key_id,subject_binding_id,verification_material_id>_or_none>
  initial: '{A:NONE,B:NONE}'
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  coordinator_access: read-write
  description: Party-specific exact-proposal acceptance bound to the validated participant, key, subject-binding,
    and verification material; each entry is immutable.
- id: protocol_profile
  type: versioned_identifier
  initial: private-match-core/v0.1
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Exact protocol profile and version.
- id: policy_binding
  type: record<policy_id,policy_version>
  initial: NONE
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
  - party_b_client
  - selected_integration_profile
  coordinator_access: read-write
  description: Immutable policy binding after evaluation begins.
- id: intended_audience
  type: set<participant_id>
  initial: EMPTY
  owner:
  - coordinator
  visibility:
  - coordinator
  - party_a_client
