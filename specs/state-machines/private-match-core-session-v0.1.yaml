    - operation_envelope.actor_id
    - operation_envelope.canonical_operation_digest
    - operation_envelope.idempotency_key
    - operation_envelope.operation_id
    - session_context.commitment_pair_id
    - session_context.evaluation_attempt_id
    - session_context.intended_audience
    - session_context.participant_binding
    - session_context.policy_binding
