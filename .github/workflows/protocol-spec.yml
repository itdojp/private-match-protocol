name: Protocol Specification

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-leakage-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12.11'
          cache: pip
          cache-dependency-path: |
            requirements-build.txt
            requirements-dev.txt
      - name: Install integrity-locked build backend
        run: python -m pip install --require-hashes -r requirements-build.txt
      - name: Install integrity-locked dependencies
        run: python -m pip install --require-hashes --no-build-isolation -r requirements-dev.txt
      - name: Run contract tests
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Run Python lint and format checks
        run: |
          python -m ruff check scripts tests
          python -m ruff format --check scripts tests
      - name: Validate privacy leakage contract
        run: python scripts/validate_leakage_contract.py --root .
      - name: Validate session state machine
        run: python scripts/validate_session_state_machine.py --root . --print-digest
      - name: Validate versioned message contract and transcript
        run: python scripts/validate_messages.py --root .
      - name: Verify deterministic conformance vectors
        run: python scripts/generate_message_vectors.py --root . --check
      - name: Validate draft reference conformance suite
        run: |
          python scripts/generate_conformance_suite.py --root . --check
          python scripts/validate_conformance_suite.py --root .
          python scripts/run_conformance.py --root . --all --output-dir artifacts/conformance-ci
          python scripts/compare_adapter_result.py --root . \
            --adapter-result conformance/suites/private-match-core-v0.1/fixtures/adapter-results/valid-end-to-end.v0.1.json \
            --case-id PMC-VALID-END-TO-END-V0-1
      - name: Validate REUSE licensing metadata
        run: reuse lint
