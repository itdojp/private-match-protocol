name: Protocol Specification

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-leakage-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements-build.txt
            requirements-dev.txt
      - name: Install integrity-locked build backend
        run: python -m pip install --require-hashes -r requirements-build.txt
      - name: Install integrity-locked dependencies
        run: python -m pip install --require-hashes --no-build-isolation -r requirements-dev.txt
      - name: Run contract tests
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Validate machine-readable contract
        run: python scripts/validate_leakage_contract.py --root .
      - name: Validate REUSE licensing metadata
        run: reuse lint
